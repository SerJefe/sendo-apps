  .force("collision",d3.forceCollide().radius(d=>d.r+6))
  .force("x",d3.forceX(W/2).strength(0.04))
  .force("y",d3.forceY(H/2).strength(0.04));
const lk=g.append("g").selectAll("line").data(links).join("line").attr("stroke","#1e293b").attr("stroke-width",0.4).attr("stroke-opacity",0.5);
const nd=g.append("g").selectAll("g").data(N).join("g").attr("cursor","pointer")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
nd.each(function(d){const s=sty(d);if(s.ri){d3.select(this).append("circle").attr("r",d.r+4).attr("fill","none").attr("stroke",s.ri).attr("stroke-width",1.5).attr("stroke-dasharray","3 2").attr("opacity",0.7)}});
nd.append("circle").attr("r",d=>d.r).each(function(d){const s=sty(d);d3.select(this).attr("fill",s.f).attr("stroke",s.sk).attr("stroke-width",s.sw).attr("fill-opacity",s.op).attr("stroke-opacity",0.8);if(s.da)d3.select(this).attr("stroke-dasharray",s.da)});
nd.append("text").text(d=>d.label).attr("text-anchor","middle").attr("dy",d=>d.r>16?"0.35em":(d.r+11)+"px").attr("fill",d=>{if(d.tp==="contrato"||d.tp==="prospecto")return GC[d.g]||"#94a3b8";return d.r>16?"#fff":"#94a3b8"}).attr("font-size",d=>d.r>20?"11px":d.r>14?"9.5px":"8.5px").attr("font-weight",d=>d.r>16?"600":"400").attr("pointer-events","none");
nd.on("click",(e,d)=>{
  e.stopPropagation();
  document.getElementById("pn").textContent=d.label;
  document.getElementById("pt").textContent=d.tp+(d.st?" · "+d.st.toUpperCase():"")+" · "+d.g;
  document.getElementById("pt").style.color=GC[d.g]||"#64748b";
  document.getElementById("pd").textContent=d.dt||"";
  const cn=links.filter(l=>(l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id);
  const cx=cn.map(l=>{const o=(l.source.id||l.source)===d.id?(l.target.id||l.target):(l.source.id||l.source);return N.find(n=>n.id===o)}).filter(Boolean);
  document.getElementById("pg").innerHTML=cx.map(n=>"<span class='t' style='border-color:"+(GC[n.g]||"#334155")+"30;color:"+(GC[n.g]||"#64748b")+"'>"+n.label+"</span>").join("");
  document.getElementById("ip").classList.add("open");
  nd.select("circle:last-of-type").attr("opacity",n=>{if(n.id===d.id)return 1;return cn.some(l=>(l.source.id||l.source)===n.id||(l.target.id||l.target)===n.id)?0.85:0.08});
  nd.selectAll("text").attr("opacity",n=>{if(n.id===d.id)return 1;return cn.some(l=>(l.source.id||l.source)===n.id||(l.target.id||l.target)===n.id)?1:0.05});
  lk.attr("stroke-opacity",l=>(l.source.id===d.id||l.target.id===d.id)?0.7:0.03).attr("stroke",l=>(l.source.id===d.id||l.target.id===d.id)?(GC[d.g]||"#475569"):"#1e293b");
});
svg.on("click",()=>{rH();cP()});
function rH(){nd.select("circle:last-of-type").each(function(d){d3.select(this).attr("opacity",sty(d).op)});nd.selectAll("text").attr("opacity",1);lk.attr("stroke-opacity",0.5).attr("stroke","#1e293b")}
function cP(){document.getElementById("ip").classList.remove("open");rH()}
function cl(){document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"))}
function fG(gr,btn){cl();btn.classList.add("on");if(gr==="all"){nd.attr("display","block");lk.attr("display","block");rH();return}nd.attr("display",d=>(d.g===gr||d.id==="sebastian")?"block":"none");lk.attr("display",l=>{return((l.source.g||"")==gr||(l.target.g||"")==gr||l.source.id==="sebastian"||l.target.id==="sebastian")?"block":"none"})}
function fT(tp,btn){cl();btn.classList.add("on");nd.attr("display",d=>(d.tp===tp||d.id==="sebastian")?"block":"none");lk.attr("display",l=>((l.source.tp||"")==tp||(l.target.tp||"")==tp)?"block":"none")}
function fS(st,btn){cl();btn.classList.add("on");nd.attr("display",d=>(d.st===st||d.id==="sebastian")?"block":"none");lk.attr("display","none")}
sim.on("tick",()=>{lk.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);nd.attr("transform",d=>"translate("+d.x+","+d.y+")")});
</script>
</body>
</html>
