<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Priorizador · Sebastián</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════
     PRIORIZADOR · paleta canon Ser Siendo (skill dashboard-organizer)
     Principios: crema+navy+gold · Cormorant headers · JetBrains Mono cifras
     · densidad controlada · papel editorial · móvil-first
  ═══════════════════════════════════════════════════════ */
  :root {
    color-scheme: light;
    --bg:         #faf7ee;
    --bg2:        #f5eed5;
    --bg-card:    #fdfbf2;
    --bg-hi:      #fffef8;
    --navy:       #091f2e;
    --navy-med:   #0f2844;
    --navy-soft:  #123b58;
    --gold:       #b89949;
    --gold-soft:  #d4a052;
    --gold-line:  #c9a84a;
    --olive:      #5a7a4a;
    --alert:      #a62e2e;
    --warn:       #d4a052;
    --muted:      #6b7580;
    --text-inv:   #F5F1E4;
    --border-soft:rgba(201,168,74,0.3);
    --paper-shadow: 0 1px 2px rgba(40,30,20,.04), 0 8px 24px rgba(40,30,20,.06);
    --paper-shadow-lg: 0 2px 8px rgba(40,30,20,.06), 0 24px 48px rgba(40,30,20,.10);
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg) !important;
    color: var(--navy) !important;
    font-family: 'Inter', -apple-system, system-ui, sans-serif !important;
    font-weight: 400 !important;
    -webkit-font-smoothing: antialiased;
    letter-spacing: 0.005em;
  }
  body { background: radial-gradient(ellipse at top left, #f2ecd9 0%, #faf7ee 45%), #faf7ee !important; }

  /* Contenedor principal móvil-first */
  body > div#root > * { max-width: 920px; margin-left: auto; margin-right: auto; }

  /* Sliders canon gold */
  input[type=range]{-webkit-appearance:none;height:4px;background:var(--border-soft);border-radius:9999px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:20px;width:20px;border-radius:9999px;background:var(--gold);cursor:pointer;border:2px solid var(--bg-card);box-shadow:0 0 0 1px var(--gold), 0 2px 4px rgba(184,153,73,0.3);}

  /* Glass → papel editorial */
  .glass{
    background: var(--bg-card) !important;
    backdrop-filter: none !important;
    border: 1px solid #e8e1c8 !important;
    border-left: 3px solid var(--gold) !important;
    box-shadow: var(--paper-shadow);
  }

  /* ═══ Fondos Tailwind neutrals → paleta crema ═══ */
  .bg-neutral-950{background-color:var(--bg) !important;}
  .bg-neutral-900,.bg-neutral-900\/60{background-color:var(--bg-card) !important;}
  .bg-neutral-800,.bg-neutral-800\/80{background-color:var(--bg2) !important;}
  .bg-neutral-500\/10,.bg-neutral-500{background-color:rgba(107,117,128,0.08) !important;}
  .bg-neutral-200{background-color:var(--bg2) !important;}
  .bg-black,.bg-black\/70{background-color:rgba(9,31,46,0.82) !important;}
  .bg-white{background-color:var(--bg-card) !important;color:var(--navy) !important;}

  /* ═══ Texto neutrals claros → navy/muted ═══ */
  .text-neutral-100,.text-neutral-200,.text-neutral-300,.text-white{color:var(--navy) !important;}
  .text-neutral-400,.text-neutral-500,.text-neutral-600,.text-neutral-700{color:var(--muted) !important;}

  /* ═══ Borders y rings ═══ */
  .border-neutral-600,.border-neutral-700,.border-neutral-800,.border-neutral-900,.border-neutral-800\/80,.border-neutral-300{border-color:var(--border-soft) !important;}
  .ring-neutral-700,.ring-neutral-800,.ring-neutral-500\/40{--tw-ring-color:var(--border-soft) !important;}

  /* ═══ Cyan/Sky → dorado canon ═══ */
  .bg-cyan-500{background-color:var(--gold) !important;color:var(--navy) !important;}
  .bg-cyan-500\/8{background-color:rgba(184,153,73,0.06) !important;}
  .bg-cyan-500\/10{background-color:rgba(184,153,73,0.10) !important;}
  .bg-cyan-500\/15{background-color:rgba(184,153,73,0.14) !important;}
  .bg-cyan-500\/25{background-color:rgba(184,153,73,0.22) !important;}
  .ring-cyan-500\/30{--tw-ring-color:rgba(184,153,73,0.35) !important;}
  .ring-cyan-500\/60{--tw-ring-color:rgba(184,153,73,0.7) !important;}
  .text-cyan-300,.text-cyan-400,.text-cyan-500{color:var(--gold) !important;}

  .bg-sky-500{background-color:var(--navy) !important;color:var(--text-inv) !important;}
  .bg-sky-500\/10{background-color:rgba(9,31,46,0.07) !important;}
  .ring-sky-500\/40{--tw-ring-color:rgba(9,31,46,0.3) !important;}
  .text-sky-300,.text-sky-400,.text-sky-500{color:var(--navy) !important;}

  /* ═══ Oliva (cerrada/ok) ═══ */
  .bg-emerald-500,.bg-emerald-600{background-color:var(--olive) !important;color:var(--text-inv) !important;}
  .border-emerald-500{border-color:var(--olive) !important;}
  .text-emerald-200,.text-emerald-300,.text-emerald-400,.text-emerald-500{color:var(--olive) !important;}

  /* ═══ Alert vinoso (urgencia real) ═══ */
  .bg-rose-500{background-color:var(--alert) !important;color:var(--text-inv) !important;}
  .bg-rose-500\/10{background-color:rgba(166,46,46,0.08) !important;}
  .bg-rose-500\/15{background-color:rgba(166,46,46,0.12) !important;}
  .bg-rose-500\/20{background-color:rgba(166,46,46,0.16) !important;}
  .bg-rose-500\/25{background-color:rgba(166,46,46,0.2) !important;}
  .ring-rose-500\/30{--tw-ring-color:rgba(166,46,46,0.3) !important;}
  .ring-rose-500\/40{--tw-ring-color:rgba(166,46,46,0.4) !important;}
  .text-rose-200,.text-rose-300,.text-rose-400,.text-rose-500{color:var(--alert) !important;}

  /* ═══ Mostaza/dorado soft (atención) ═══ */
  .bg-amber-500{background-color:var(--gold-soft) !important;color:var(--navy) !important;}
  .bg-amber-500\/10{background-color:rgba(212,160,82,0.1) !important;}
  .bg-amber-500\/20{background-color:rgba(212,160,82,0.18) !important;}
  .ring-amber-500\/30{--tw-ring-color:rgba(212,160,82,0.35) !important;}
  .ring-amber-500\/40{--tw-ring-color:rgba(212,160,82,0.5) !important;}
  .text-amber-200,.text-amber-300,.text-amber-400,.text-amber-500{color:var(--gold-soft) !important;}
  .bg-orange-500\/20{background-color:rgba(201,168,74,0.18) !important;}
  .ring-orange-500\/30{--tw-ring-color:rgba(201,168,74,0.35) !important;}

  /* ═══ Morados PROHIBIDOS por skill → navy soft ═══ */
  .bg-purple-500,.bg-purple-500\/10{background-color:rgba(9,31,46,0.06) !important;}
  .bg-purple-500\/15{background-color:rgba(9,31,46,0.1) !important;}
  .bg-purple-500\/25{background-color:rgba(9,31,46,0.18) !important;}
  .ring-purple-500\/30{--tw-ring-color:rgba(9,31,46,0.3) !important;}
  .text-purple-200,.text-purple-300,.text-purple-400,.text-purple-500{color:var(--navy) !important;}

  /* ═══ TIPOGRAFÍA canon dashboard ═══ */
  h1 { font-family:'Cormorant Garamond',serif !important; font-weight:500 !important; font-size:28px !important; letter-spacing:-0.01em; color:var(--navy) !important; line-height:1.1; }
  h2 { font-family:'Cormorant Garamond',serif !important; font-weight:500 !important; font-size:20px !important; color:var(--navy) !important; letter-spacing:-0.005em; }
  h3, h4, h5 { font-family:'Inter',sans-serif !important; color:var(--navy) !important; }

  /* Labels uppercase tracked (skill: 10-11px, letter-spacing 0.1em, gold) */
  .uppercase.tracking-wider, .uppercase.tracking-widest {
    font-family:'Inter',sans-serif !important;
    font-size:10.5px !important;
    font-weight:600 !important;
    letter-spacing:0.1em !important;
    color:var(--gold) !important;
  }

  /* ═══ CIFRAS grandes → JetBrains Mono ═══ */
  .tabular-nums, .text-5xl, .text-4xl, .text-3xl, .text-2xl, .text-xl {
    font-family:'JetBrains Mono','Cormorant Garamond',monospace !important;
  }
  .text-5xl { font-size:44px !important; font-weight:600 !important; line-height:1 !important; color:var(--navy) !important; }
  .text-4xl { font-size:34px !important; font-weight:600 !important; line-height:1.05 !important; color:var(--navy) !important; }
  .text-3xl { font-size:26px !important; font-weight:600 !important; line-height:1.1 !important; color:var(--navy) !important; }
  .text-2xl { font-size:22px !important; font-weight:700 !important; line-height:1.1 !important; color:var(--navy) !important; }

  /* font-light en cifras → 600 (skill: bold en cifras) */
  .font-light { font-weight:600 !important; }

  /* Mono explícito */
  .font-mono, code, pre { font-family:'JetBrains Mono',monospace !important; }

  /* ═══ CARDS estilo papel editorial ═══ */
  .rounded-2xl.border, .rounded-xl.ring-1 {
    background: var(--bg-card) !important;
    border-color: #e8e1c8 !important;
    box-shadow: var(--paper-shadow) !important;
  }
  .glass, [class*="rounded-2xl"][class*="border-neutral"] {
    border-left-width: 3px !important;
    border-left-color: var(--gold) !important;
  }

  /* ═══ CARD.CRISIS (maxima urgencia) · drama navy gradient ═══ */
  .ring-rose-500\/30.bg-rose-500\/15,
  .ring-rose-500\/40.bg-rose-500\/20,
  .ring-rose-500\/40.bg-rose-500\/25 {
    background: linear-gradient(135deg, #091f2e 0%, #123b58 100%) !important;
    color: var(--text-inv) !important;
    border: 1px solid var(--gold) !important;
    box-shadow: var(--paper-shadow-lg) !important;
  }
  .ring-rose-500\/30.bg-rose-500\/15 > *,
  .ring-rose-500\/40.bg-rose-500\/20 > *,
  .ring-rose-500\/40.bg-rose-500\/25 > * { color: var(--text-inv) !important; }

  /* ═══ Form controls ═══ */
  select, input[type="text"], input[type="date"], input[type="number"], textarea {
    background: var(--bg-card) !important;
    color: var(--navy) !important;
    border-color: var(--border-soft) !important;
    font-family:'Inter',sans-serif !important;
  }
  select:focus, input:focus, textarea:focus {
    outline: 2px solid var(--gold) !important;
    outline-offset: -1px;
    border-color: var(--gold) !important;
  }

  /* Botón primary "Guardar" → gold */
  button.bg-white { background: var(--gold) !important; color: var(--navy) !important; font-weight:600 !important; }
  button.bg-white:hover { background: var(--gold-soft) !important; }

  /* Tap targets */
  button, a, select, input[type="date"] { min-height: 36px; }
  nav button, .nav button { min-height: 40px; }

  /* Scrollbar */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: rgba(184,153,73,.25); border-radius:5px; }
  ::-webkit-scrollbar-thumb:hover{ background: rgba(184,153,73,.45); }

  /* Dividers y italic */
  .border-t, .border-b { border-color: var(--border-soft) !important; }
  .border-dashed { border-style: dashed !important; border-color: var(--border-soft) !important; }
  .italic { color: var(--muted) !important; }
</style>
</head>
<body class="font-sans antialiased" style="color:#091f2e;background:#faf7ee;">
<a href="/" style="position:fixed;top:12px;left:12px;z-index:200;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(184,153,73,0.14);color:#091f2e;border:1px solid rgba(184,153,73,0.5);border-radius:8px;font-family:Inter,-apple-system,system-ui,sans-serif;font-size:12px;font-weight:600;letter-spacing:0.02em;text-decoration:none;box-shadow:0 2px 8px rgba(9,31,46,0.06)">← Dashboard</a>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const API = "/tasks";
const DATA = "/data";
const REFRESH_MS = 30 * 1000;

// --- LOGICA PURA ---
const PESOS = { impacto:3, urgencia:2, consecuencia:3, arrastre:2, facilidad:1 };
function calcP(t){ return (t.impacto||3)*PESOS.impacto+(t.urgencia||3)*PESOS.urgencia+(t.consecuencia||3)*PESOS.consecuencia+(t.arrastre||3)*PESOS.arrastre+(t.facilidad||3)*PESOS.facilidad; }
function clasN(p){ if(p>=45)return"maxima";if(p>=35)return"alta";if(p>=25)return"media";return"baja"; }
function rec(t){
  const p=calcP(t);
  if(p>=35&&(t.facilidad||3)<=2) return{a:"Dividir",m:"Importante pero difusa. Acción de 10-15 min primero."};
  if(p>=45)return{a:"Hacer hoy",m:"Puntaje máximo."};
  if(p>=35)return{a:"Programar pronto",m:"Alta prioridad."};
  if(p>=25){if((t.arrastre||3)>=4&&(t.facilidad||3)>=3)return{a:"Delegar",m:"Destraba a otros."};return{a:"Programar",m:"Media."};}
  return{a:"Backlog",m:"Baja."};
}
function alertas(t){
  const o=[];
  if((t.urgencia||3)>=4&&(t.impacto||3)<=2&&(t.consecuencia||3)<=2)o.push({t:"falso urgente",x:"Ruido urgente, no prioridad real."});
  if((t.impacto||3)>=4&&(t.arrastre||3)>=4&&(t.urgencia||3)<=2)o.push({t:"joya importante",x:"Importante no urgente. Protege espacio."});
  if(calcP(t)>=35&&(t.facilidad||3)<=2)o.push({t:"bloqueo",x:"Dividir en acción de 10-15 min."});
  return o;
}
function sortPri(ts){ return[...ts].sort((a,b)=>{
  if(a.estado==="cerrada"&&b.estado!=="cerrada")return 1;if(b.estado==="cerrada"&&a.estado!=="cerrada")return-1;
  if(a.evaluada&&!b.evaluada)return-1;if(b.evaluada&&!a.evaluada)return 1;
  return calcP(b)-calcP(a);
}); }

// --- deadlines ---
function deadlineBadge(fl){
  if(!fl)return null;
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const d=new Date(fl+"T00:00:00");
  const diff=Math.round((d-hoy)/(86400000));
  if(diff<0)return{label:`Vencida (${-diff}d)`,cls:"bg-rose-500/20 text-rose-300 ring-rose-500/40"};
  if(diff===0)return{label:"Hoy",cls:"bg-rose-500/20 text-rose-300 ring-rose-500/40"};
  if(diff===1)return{label:"Mañana",cls:"bg-amber-500/20 text-amber-300 ring-amber-500/40"};
  if(diff<=3)return{label:`${diff}d`,cls:"bg-amber-500/10 text-amber-300 ring-amber-500/30"};
  return{label:`${diff}d`,cls:"bg-neutral-800 text-neutral-400 ring-neutral-700"};
}

const NV = {
  maxima:{l:"Máxima",c:"bg-rose-500",t:"text-rose-300",r:"ring-rose-500/40",s:"bg-rose-500/10"},
  alta:{l:"Alta",c:"bg-amber-500",t:"text-amber-300",r:"ring-amber-500/40",s:"bg-amber-500/10"},
  media:{l:"Media",c:"bg-sky-500",t:"text-sky-300",r:"ring-sky-500/40",s:"bg-sky-500/10"},
  baja:{l:"Baja",c:"bg-neutral-500",t:"text-neutral-300",r:"ring-neutral-500/40",s:"bg-neutral-500/10"},
};
// Ejes de Sebastian (2026-04-15): reemplazan las categorias legacy trabajo/personal/etc.
// Orden en el dropdown. El default para tareas nuevas es "condugas".
const CATS=["condugas","siendo-consulting","ser-siendo","docencia","patrimonio","casa-ozzio","salud"];
// Equipo para reasignar/delegar al evaluar. Espejo de TEAM_MEMBERS en dashboard.html.
const TEAM_MEMBERS_LITE=[
  {alias:"Sebastian", full:"Sebastian Sanchez",   rol:"Gerente"},
  {alias:"Cami",      full:"Juan Camilo Berrio",  rol:"Proyectos"},
  {alias:"Andre",     full:"Andrea Bernal",       rol:"Finanzas y Contable"},
  {alias:"Willi",     full:"William Lopez",       rol:"Admin"},
  {alias:"Juan G",    full:"Juan Guillermo",      rol:"Estrategia y RRHH"},
  {alias:"Carlos H",  full:"Carlos Hernan Lopez", rol:"Nuevos Negocios y Logistica"},
  {alias:"JuanPa",    full:"Ex-dir Ayura",        rol:"Productividad"},
  {alias:"Adolfo",    full:"Adolfo",              rol:"Mentor Junta"},
  {alias:"Lina",      full:"Lina Russi",          rol:"Gestora · Being CoRe"},
  {alias:"Mona",      full:"Monica Gonzalez",     rol:"Comercial · Being CoRe"},
  {alias:"Ema",       full:"Emanuel",             rol:"Dev Odoo · Being CoRe"},
  {alias:"Doctor",    full:"Camilo Marin",        rol:"Abogado"},
];
const CRIT=[
  {k:"impacto",l:"Impacto real",h:"¿Qué tanto cambia algo importante?"},
  {k:"urgencia",l:"Urgencia verdadera",h:"¿Qué tan pronto genera problema?"},
  {k:"consecuencia",l:"Consecuencia",h:"¿Qué pasa si se aplaza?"},
  {k:"arrastre",l:"Efecto arrastre",h:"¿Cuántas cosas destraba?"},
  {k:"facilidad",l:"Facilidad de arranque",h:"¿Qué tan fácil es empezar YA?"},
];

// --- API ---
async function apiGet(path){const r=await fetch(DATA+path+"?t="+Date.now(),{cache:"no-store"});return r.json();}
async function apiPost(path,body){const r=await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}

const{useState,useEffect,useMemo,useRef,useCallback}=React;

function Badge({nivel,puntaje}){const n=NV[nivel]||NV.baja;return(
  <div className={`inline-flex items-center gap-2 px-2.5 py-1 rounded-full text-xs font-medium ${n.s} ${n.t} ring-1 ${n.r}`}>
    <span className={`w-1.5 h-1.5 rounded-full ${n.c}`}></span>{n.l} · {puntaje}
  </div>);}

function Slider({value,onChange,label,hint}){return(
  <div className="space-y-1.5">
    <div className="flex items-baseline justify-between"><div><div className="text-sm font-medium">{label}</div><div className="text-xs text-neutral-500">{hint}</div></div><div className="text-2xl font-light tabular-nums w-8 text-right">{value}</div></div>
    <input type="range" min="1" max="5" step="1" value={value} onChange={e=>onChange(+e.target.value)} className="w-full"/>
    <div className="flex justify-between text-[10px] text-neutral-600 px-0.5"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
  </div>);}

function QuickCapture({onAdd,busy}){
  const[v,setV]=useState("");const[cat,setCat]=useState("condugas");const ref=useRef();
  useEffect(()=>{ref.current?.focus();},[]);
  return(
  <form onSubmit={async e=>{e.preventDefault();if(!v.trim()||busy)return;const t=v;setV("");await onAdd(t,cat);}} className="flex flex-col sm:flex-row gap-2">
    <input ref={ref} value={v} onChange={e=>setV(e.target.value)} placeholder="Captura rápida — escribe la tarea y Enter" className="flex-1 bg-neutral-900/60 border border-neutral-800 focus:border-neutral-600 outline-none rounded-xl px-4 py-3 text-base placeholder:text-neutral-600"/>
    <select value={cat} onChange={e=>setCat(e.target.value)} className="bg-neutral-900/60 border border-neutral-800 rounded-xl px-3 py-3 text-sm">{CATS.map(c=><option key={c}>{c}</option>)}</select>
    <button disabled={busy} className="px-5 py-3 rounded-xl bg-white text-black font-medium hover:bg-neutral-200 transition disabled:opacity-50">Añadir</button>
  </form>);}

function TaskRow({t,onClick,onToggle,onSnooze,onDelegar}){
  const ev=!!t.evaluada;const p=ev?(t.puntaje??calcP(t)):null;const nivel=ev?(t.nivel??clasN(p)):null;
  const r2=ev?rec(t):null;const al=ev?alertas(t):[];const cerr=t.estado==="cerrada";
  const dl=deadlineBadge(t.fecha_limite);
  const hoyISO=new Date().toISOString().slice(0,10);
  const snoozed=t.snooze_until && t.snooze_until>hoyISO;
  return(
  <div className={`glass border ${cerr?"border-neutral-900 opacity-50":snoozed?"border-purple-900/40 opacity-70":"border-neutral-800/80"} hover:border-neutral-700 rounded-2xl p-4 transition`}>
    <div className="flex items-start gap-3">
      <button onClick={e=>{e.stopPropagation();onToggle(t);}} className={`mt-1 w-5 h-5 rounded-full border-2 ${cerr?"bg-emerald-500 border-emerald-500":"border-neutral-600 hover:border-neutral-300"} shrink-0 flex items-center justify-center transition`}>
        {cerr&&<span className="text-[10px] text-black">✓</span>}
      </button>
      <button onClick={()=>onClick(t)} className="flex-1 min-w-0 text-left">
        <div className="flex items-center gap-2 mb-1 flex-wrap">
          <span className="text-[10px] uppercase tracking-wider text-neutral-500">{t.categoria||"condugas"}</span>
          {t.origen==="limitless_auto"&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-purple-500/10 text-purple-300">auto</span>}
          {t.origen==="capturador"&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-cyan-500/10 text-cyan-300">captura</span>}
          {!ev&&<span className="text-[10px] uppercase tracking-wider text-amber-500/70">· sin evaluar</span>}
          {dl&&<span className={`text-[10px] px-1.5 py-0.5 rounded-full ring-1 ${dl.cls}`}>{dl.label}</span>}

function DeadlineStrip({tareas, onDateClick}){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const abiertas = tareas.filter(t => t.estado === 'abierta');
  const DIAS_LABEL = ['D','L','M','X','J','V','S'];
  const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  // Contar vencidas (todas las anteriores a hoy)
  const hoyISO = hoy.toISOString().slice(0,10);
  const vencidas = abiertas.filter(t => t.fecha_limite && t.fecha_limite < hoyISO);

  // 14 dias desde hoy
  const dias = [];
  for (let i = 0; i <= 13; i++) {
    const d = new Date(hoy.getTime() + i * 86400000);
    const iso = d.toISOString().slice(0,10);
    const count = abiertas.filter(t => t.fecha_limite === iso).length;
    dias.push({date:d, iso, count, dow:d.getDay(), isToday:i===0, day:d.getDate(), showMonth:i===0||d.getDate()===1});
  }

  return(
  <div className="mb-5">
    <div className="flex items-center justify-between mb-2">
      <span className="text-[10px] uppercase tracking-wider text-neutral-500">Agenda de vencimientos</span>
      {vencidas.length > 0 && (
        <button onClick={() => onDateClick('__vencidas__')}
          className="text-[10px] px-2 py-0.5 rounded bg-rose-500/15 text-rose-300 ring-1 ring-rose-500/30 hover:bg-rose-500/25 transition">
          {vencidas.length} vencida{vencidas.length!==1?'s':''}
        </button>
      )}
    </div>
    <div className="flex gap-[3px] overflow-x-auto pb-1">
      {dias.map(d => (
        <button key={d.iso} onClick={() => d.count > 0 && onDateClick(d.iso)}
          className={[
            "flex-shrink-0 w-10 h-14 rounded-lg flex flex-col items-center justify-center transition",
            d.isToday ? "ring-1 ring-cyan-500/60 bg-cyan-500/8" : "",
            d.count > 0 ? "cursor-pointer hover:bg-neutral-800" : "opacity-35 cursor-default",
          ].join(" ")}>
          {d.showMonth && <span className="text-[7px] text-neutral-600 uppercase -mb-0.5">{MESES[d.date.getMonth()]}</span>}
          <span className="text-[9px] text-neutral-600">{DIAS_LABEL[d.dow]}</span>
          <span className={`text-sm ${d.isToday ? "text-cyan-300 font-medium" : "text-neutral-400"}`}>{d.day}</span>
          {d.count > 0 && <span className={`text-[9px] font-mono ${d.isToday ? "text-cyan-400" : "text-amber-400"}`}>{d.count}</span>}
        </button>
      ))}
    </div>
  </div>);
}

function ExportImport({tareas,onImport}){
  function doExport(){
    const blob=new Blob([JSON.stringify({tareas,exported_at:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tracker-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
  }
  function doImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tareas&&confirm(`Importar ${d.tareas.length} tareas? Esto REEMPLAZA todo.`)){onImport(d.tareas);}}catch{alert("JSON inválido");}};r.readAsText(f);
  }
  return(
  <div className="flex gap-2">
    <button onClick={doExport} className="text-xs text-neutral-500 hover:text-neutral-200 px-2 py-1 rounded border border-neutral-800">Exportar</button>
    <label className="text-xs text-neutral-500 hover:text-neutral-200 px-2 py-1 rounded border border-neutral-800 cursor-pointer">Importar<input type="file" accept=".json" onChange={doImport} className="hidden"/></label>
  </div>);}

        apiGet("/tareas-tracker.json"),
        apiGet("/briefing-hoy.json").catch(()=>null),
        apiGet("/briefing-ayer.json").catch(()=>null),
        apiGet("/briefing-semana.json").catch(()=>null),
      ]);
      setTareas(d.tareas||[]);setBriefing(b);setBriefingAyer(ba);setSemana(s);setError("");
    }catch(e){setError(e.message);}
  },[]);

  useEffect(()=>{load();const id=setInterval(load,REFRESH_MS);return()=>clearInterval(id);},[load]);
  useEffect(()=>{document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")load();});},[load]);

  async function add(titulo,cat){setBusy(true);try{await apiPost("/create",{tarea:titulo,categoria:cat});await load();}catch(e){setError(e.message);}finally{setBusy(false);}}
  async function score(id,body){try{await apiPost("/score",{id,...body});await load();}catch(e){setError(e.message);}}
  async function meta(id,body){try{await apiPost("/update",{id,...body});}catch(e){setError(e.message);}}
  async function toggle(t){try{await apiPost("/toggle",{id:t.id});await load();}catch(e){setError(e.message);}}
  async function remove(id){try{await apiPost("/delete",{id});setEditando(null);await load();}catch(e){setError(e.message);}}
  async function snooze(t){
    // Posponer una tarea: deja de aparecer en HOY hasta una fecha. Si ya tiene snooze, lo limpia.
    const hoyISO=new Date().toISOString().slice(0,10);
    const yaSnoozed = t.snooze_until && t.snooze_until>hoyISO;
    if (yaSnoozed) {
      if (!confirm("Esta tarea esta pospuesta hasta "+t.snooze_until+". ¿Reactivar (quitar snooze)?")) return;
      try { await apiPost("/snooze-tarea",{id:t.id, until:"clear"}); await load(); } catch(e){setError(e.message);}
      return;
    }
    // Default: mañana. Permitir override con prompt.
    const manana=new Date(); manana.setDate(manana.getDate()+1);
    const def=manana.toISOString().slice(0,10);
    const until=window.prompt("¿Hasta cuándo? (YYYY-MM-DD, default mañana = "+def+")\nEjemplos:\n  "+def+" — mañana\n  "+new Date(Date.now()+3*86400000).toISOString().slice(0,10)+" — en 3 dias\n  "+new Date(Date.now()+7*86400000).toISOString().slice(0,10)+" — en 1 semana", def);
    if (until===null) return;
    const fecha=(until||"").trim()||def;
    const nota=window.prompt("¿Por qué la pospones? (opcional, alimenta el sistema)","");
    if (nota===null) return; // cancelado
    try {
      await apiPost("/snooze-tarea",{id:t.id, until:fecha, nota:nota||""});
      await load();
    } catch(e){setError(e.message);}
  }
  async function delegar(t){
    // Reasignar al equipo. Lista TEAM_MEMBERS_LITE.
    const opciones = TEAM_MEMBERS_LITE.map((m,i)=>(i+1)+". "+m.alias+" — "+m.full+" ("+m.rol+")").join("\n");
    const ans=window.prompt("Delegar a quien? Escribe el numero o el nombre.\n\nActual: "+(t.responsable||"sin asignar")+"\n\n"+opciones+"\n\n0. dejar como está\n-1. limpiar (sin asignar)");
    if (ans===null) return;
    const trimmed=(ans||"").trim();
    if (!trimmed||trimmed==="0") return;
    let nuevo="";
    if (trimmed==="-1") nuevo="";
    else {
      const n=parseInt(trimmed,10);
      if (!isNaN(n)&&n>=1&&n<=TEAM_MEMBERS_LITE.length) nuevo=TEAM_MEMBERS_LITE[n-1].full;
      else {
        // Buscar por nombre/alias parcial case-insensitive
        const low=trimmed.toLowerCase();
        const match=TEAM_MEMBERS_LITE.find(m=>m.alias.toLowerCase().includes(low)||m.full.toLowerCase().includes(low));
        nuevo=match?match.full:trimmed;
      }
    }
    try { await apiPost("/update",{id:t.id, responsable:nuevo}); await load(); } catch(e){setError(e.message);}
  }

  const abiertas=tareas.filter(t=>t.estado!=="cerrada");
  // Snooze: oculta tareas pospuestas hasta una fecha futura. Activas hoy = no snoozed o snooze vencido.
  const __hoyISO_view=new Date().toISOString().slice(0,10);
  const isSnoozed=t=>t.snooze_until && t.snooze_until>__hoyISO_view;
  const sinEval=abiertas.filter(t=>!t.evaluada && !isSnoozed(t));
  const sinEvalSnoozed=abiertas.filter(t=>!t.evaluada && isSnoozed(t));
  const evaluadas=sortPri(abiertas.filter(t=>t.evaluada && !isSnoozed(t)));
  const top5=evaluadas.slice(0,5);

  const filtradas=useMemo(()=>{
    return sortPri(tareas).filter(t=>{
      if(filtros.fechaLimite){
        if(filtros.fechaLimite==='__vencidas__'){
          var hoyF=new Date();hoyF.setHours(0,0,0,0);var hoyISO=hoyF.toISOString().slice(0,10);
          if(!t.fecha_limite||t.fecha_limite>=hoyISO)return false;
        } else {
          if(t.fecha_limite!==filtros.fechaLimite)return false;
        }
      }
      if(filtros.categoria&&(t.categoria||"condugas")!==filtros.categoria)return false;
      if(filtros.estado&&t.estado!==filtros.estado)return false;
      if(filtros.origen&&t.origen!==filtros.origen)return false;
      if(filtros.nivel){if(!t.evaluada)return false;if((t.nivel||clasN(calcP(t)))!==filtros.nivel)return false;}
      if(filtros.extra==="vencida"&&!t.vencida)return false;
      if(filtros.extra==="estancada"&&!t.estancada)return false;
      if(filtros.extra==="sin_evaluar"&&t.evaluada)return false;
      return true;
    });
  },[tareas,filtros]);

  return(
  <div className="min-h-screen max-w-5xl mx-auto px-4 sm:px-6 py-8">
    <header className="flex items-center justify-between mb-8">
      <div><div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500">Priorizador · tracker real</div><h1 className="text-2xl font-light">¿Qué hago primero?</h1></div>
      <nav className="flex gap-1 text-sm items-center flex-wrap">
        {[["hoy","Hoy"],["dashboard","Vista"],["lista","Todas"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className={`px-3 py-1.5 rounded-lg transition ${tab===k?"bg-neutral-800 text-white":"text-neutral-500 hover:text-neutral-200"}`}>{l}</button>))}
        {top5.length>0&&<button onClick={()=>setFocusMode(true)} className="px-3 py-1.5 rounded-lg bg-purple-500/15 text-purple-300 ring-1 ring-purple-500/30 hover:bg-purple-500/25 transition">Focus</button>}
        <a href="/" className="px-3 py-1.5 rounded-lg text-neutral-500 hover:text-neutral-200 transition">← Dash</a>
      </nav>
    </header>

    {error&&<div className="mb-4 text-xs p-3 rounded-lg bg-rose-500/10 text-rose-300 ring-1 ring-rose-500/30">⚠ {error}</div>}

    <section className="mb-6"><QuickCapture onAdd={add} busy={busy}/></section>

    {tab==="hoy"&&(
      <>
        <BriefingHoy briefing={briefing}/>
        <div className="mt-6"><DeadlineStrip tareas={tareas} onDateClick={(d)=>{setFiltros({...filtros,fechaLimite:d,estado:"abierta"});setTab("lista");}}/></div>
        <div className="mt-2"><Summary tareas={abiertas}/></div>
        {sinEval.length>0&&(
          <section className="mt-6">
            <div className="flex items-center justify-between mb-3"><h2 className="text-sm uppercase tracking-wider text-neutral-400">Sin evaluar · {sinEval.length}</h2><span className="text-xs text-neutral-600">Click para priorizar · 💤 = posponer</span></div>
            <div className="grid sm:grid-cols-2 gap-3">{sinEval.slice(0,6).map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle} onSnooze={snooze} onDelegar={delegar}/>)}</div>
            {sinEval.length>6&&<div className="text-center mt-2"><button onClick={()=>setTab("lista")} className="text-xs text-neutral-500 hover:text-neutral-200">Ver todas ({sinEval.length})</button></div>}
          </section>)}
        {sinEvalSnoozed.length>0&&(
          <section className="mt-4">
            <details>
              <summary className="text-xs uppercase tracking-wider text-purple-400/80 cursor-pointer">💤 Pospuestas ({sinEvalSnoozed.length}) · click para ver</summary>
              <div className="grid sm:grid-cols-2 gap-3 mt-3">{sinEvalSnoozed.map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle} onSnooze={snooze} onDelegar={delegar}/>)}</div>
            </details>
          </section>)}
        <div className="mt-6 space-y-3">
          <BriefingAyer data={briefingAyer}/>
          <SemanaPanel data={semana}/>
        </div>
      </>)}

    {tab==="dashboard"&&(
      <>
        <DeadlineStrip tareas={tareas} onDateClick={(d)=>{setFiltros({...filtros,fechaLimite:d,estado:"abierta"});setTab("lista");}}/>
        <Summary tareas={abiertas}/>
        <section className="mt-6"><h2 className="text-sm uppercase tracking-wider text-neutral-400 mb-3">Top prioridades</h2>
          {top5.length===0?<div className="text-center py-12 text-neutral-600 text-sm border border-dashed border-neutral-800 rounded-2xl">{tareas.length===0?"Sin tareas.":"Evalúa tareas para ver prioridades."}</div>
          :<div className="space-y-3">{top5.map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle} onSnooze={snooze} onDelegar={delegar}/>)}</div>}
        </section>
      </>)}

    {tab==="lista"&&(
      <>
        <Filters filtros={filtros} setFiltros={setFiltros}/>
        <section className="mt-4 space-y-3">
          {filtradas.length===0?<div className="text-center py-12 text-neutral-600 text-sm border border-dashed border-neutral-800 rounded-2xl">Sin resultados.</div>
          :filtradas.map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle} onSnooze={snooze} onDelegar={delegar}/>)}
        </section>
      </>)}

    {editando&&<EvalModal tarea={editando} onClose={()=>setEditando(null)} onSave={score} onDelete={remove} onMeta={meta}/>}
    {focusMode&&top5.length>0&&<FocusMode tarea={top5[0]} onClose={()=>setFocusMode(false)} onToggle={toggle}/>}

    <footer className="mt-16 flex items-center justify-between text-[10px] text-neutral-700">
      <span>{tareas.length} tareas · refresh {REFRESH_MS/1000}s</span>
      <ExportImport tareas={tareas} onImport={async(ts)=>{/* TODO: bulk import via API */alert("Import API pendiente");}}/>
    </footer>
  </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
