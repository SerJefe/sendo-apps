<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Priorizador · Sebastián</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root { color-scheme: dark; }
  html,body { background:#0b0d10; }
  input[type=range]{-webkit-appearance:none;height:4px;background:#2a2f37;border-radius:9999px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:18px;width:18px;border-radius:9999px;background:#fff;cursor:pointer;border:2px solid #0b0d10;box-shadow:0 0 0 1px #fff;}
  .glass{background:rgba(255,255,255,0.03);backdrop-filter:blur(6px);}
</style>
</head>
<body class="text-neutral-100 font-sans antialiased">
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const API = "/tasks";
const DATA = "/data";
const REFRESH_MS = 30 * 1000;

// --- LOGICA PURA ---
const PESOS = { impacto:3, urgencia:2, consecuencia:3, arrastre:2, facilidad:1 };
function calcP(t){ return (t.impacto||3)*PESOS.impacto+(t.urgencia||3)*PESOS.urgencia+(t.consecuencia||3)*PESOS.consecuencia+(t.arrastre||3)*PESOS.arrastre+(t.facilidad||3)*PESOS.facilidad; }
function clasN(p){ if(p>=45)return"maxima";if(p>=35)return"alta";if(p>=25)return"media";return"baja"; }
function rec(t){
  const p=calcP(t);
  if(p>=35&&(t.facilidad||3)<=2) return{a:"Dividir",m:"Importante pero difusa. Acción de 10-15 min primero."};
  if(p>=45)return{a:"Hacer hoy",m:"Puntaje máximo."};
  if(p>=35)return{a:"Programar pronto",m:"Alta prioridad."};
  if(p>=25){if((t.arrastre||3)>=4&&(t.facilidad||3)>=3)return{a:"Delegar",m:"Destraba a otros."};return{a:"Programar",m:"Media."};}
  return{a:"Backlog",m:"Baja."};
}
function alertas(t){
  const o=[];
  if((t.urgencia||3)>=4&&(t.impacto||3)<=2&&(t.consecuencia||3)<=2)o.push({t:"falso urgente",x:"Ruido urgente, no prioridad real."});
  if((t.impacto||3)>=4&&(t.arrastre||3)>=4&&(t.urgencia||3)<=2)o.push({t:"joya importante",x:"Importante no urgente. Protege espacio."});
  if(calcP(t)>=35&&(t.facilidad||3)<=2)o.push({t:"bloqueo",x:"Dividir en acción de 10-15 min."});
  return o;
}
function sortPri(ts){ return[...ts].sort((a,b)=>{
  if(a.estado==="cerrada"&&b.estado!=="cerrada")return 1;if(b.estado==="cerrada"&&a.estado!=="cerrada")return-1;
  if(a.evaluada&&!b.evaluada)return-1;if(b.evaluada&&!a.evaluada)return 1;
  return calcP(b)-calcP(a);
}); }

// --- deadlines ---
function deadlineBadge(fl){
  if(!fl)return null;
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const d=new Date(fl+"T00:00:00");
  const diff=Math.round((d-hoy)/(86400000));
  if(diff<0)return{label:`Vencida (${-diff}d)`,cls:"bg-rose-500/20 text-rose-300 ring-rose-500/40"};
  if(diff===0)return{label:"Hoy",cls:"bg-rose-500/20 text-rose-300 ring-rose-500/40"};
  if(diff===1)return{label:"Mañana",cls:"bg-amber-500/20 text-amber-300 ring-amber-500/40"};
  if(diff<=3)return{label:`${diff}d`,cls:"bg-amber-500/10 text-amber-300 ring-amber-500/30"};
  return{label:`${diff}d`,cls:"bg-neutral-800 text-neutral-400 ring-neutral-700"};
}

const NV = {
  maxima:{l:"Máxima",c:"bg-rose-500",t:"text-rose-300",r:"ring-rose-500/40",s:"bg-rose-500/10"},
  alta:{l:"Alta",c:"bg-amber-500",t:"text-amber-300",r:"ring-amber-500/40",s:"bg-amber-500/10"},
  media:{l:"Media",c:"bg-sky-500",t:"text-sky-300",r:"ring-sky-500/40",s:"bg-sky-500/10"},
  baja:{l:"Baja",c:"bg-neutral-500",t:"text-neutral-300",r:"ring-neutral-500/40",s:"bg-neutral-500/10"},
};
// Ejes de Sebastian (2026-04-15): reemplazan las categorias legacy trabajo/personal/etc.
// Orden en el dropdown. El default para tareas nuevas es "condugas".
const CATS=["condugas","being-core","ser-siendo","docencia","patrimonio","casa-ozzio","salud"];
const CRIT=[
  {k:"impacto",l:"Impacto real",h:"¿Qué tanto cambia algo importante?"},
  {k:"urgencia",l:"Urgencia verdadera",h:"¿Qué tan pronto genera problema?"},
  {k:"consecuencia",l:"Consecuencia",h:"¿Qué pasa si se aplaza?"},
  {k:"arrastre",l:"Efecto arrastre",h:"¿Cuántas cosas destraba?"},
  {k:"facilidad",l:"Facilidad de arranque",h:"¿Qué tan fácil es empezar YA?"},
];

// --- API ---
async function apiGet(path){const r=await fetch(DATA+path+"?t="+Date.now(),{cache:"no-store"});return r.json();}
async function apiPost(path,body){const r=await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}

const{useState,useEffect,useMemo,useRef,useCallback}=React;

function Badge({nivel,puntaje}){const n=NV[nivel]||NV.baja;return(
  <div className={`inline-flex items-center gap-2 px-2.5 py-1 rounded-full text-xs font-medium ${n.s} ${n.t} ring-1 ${n.r}`}>
    <span className={`w-1.5 h-1.5 rounded-full ${n.c}`}></span>{n.l} · {puntaje}
  </div>);}

function Slider({value,onChange,label,hint}){return(
  <div className="space-y-1.5">
    <div className="flex items-baseline justify-between"><div><div className="text-sm font-medium">{label}</div><div className="text-xs text-neutral-500">{hint}</div></div><div className="text-2xl font-light tabular-nums w-8 text-right">{value}</div></div>
    <input type="range" min="1" max="5" step="1" value={value} onChange={e=>onChange(+e.target.value)} className="w-full"/>
    <div className="flex justify-between text-[10px] text-neutral-600 px-0.5"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
  </div>);}

function QuickCapture({onAdd,busy}){
  const[v,setV]=useState("");const[cat,setCat]=useState("condugas");const ref=useRef();
  useEffect(()=>{ref.current?.focus();},[]);
  return(
  <form onSubmit={async e=>{e.preventDefault();if(!v.trim()||busy)return;const t=v;setV("");await onAdd(t,cat);}} className="flex flex-col sm:flex-row gap-2">
    <input ref={ref} value={v} onChange={e=>setV(e.target.value)} placeholder="Captura rápida — escribe la tarea y Enter" className="flex-1 bg-neutral-900/60 border border-neutral-800 focus:border-neutral-600 outline-none rounded-xl px-4 py-3 text-base placeholder:text-neutral-600"/>
    <select value={cat} onChange={e=>setCat(e.target.value)} className="bg-neutral-900/60 border border-neutral-800 rounded-xl px-3 py-3 text-sm">{CATS.map(c=><option key={c}>{c}</option>)}</select>
    <button disabled={busy} className="px-5 py-3 rounded-xl bg-white text-black font-medium hover:bg-neutral-200 transition disabled:opacity-50">Añadir</button>
  </form>);}

function TaskRow({t,onClick,onToggle}){
  const ev=!!t.evaluada;const p=ev?(t.puntaje??calcP(t)):null;const nivel=ev?(t.nivel??clasN(p)):null;
  const r2=ev?rec(t):null;const al=ev?alertas(t):[];const cerr=t.estado==="cerrada";
  const dl=deadlineBadge(t.fecha_limite);
  return(
  <div className={`glass border ${cerr?"border-neutral-900 opacity-50":"border-neutral-800/80"} hover:border-neutral-700 rounded-2xl p-4 transition`}>
    <div className="flex items-start gap-3">
      <button onClick={e=>{e.stopPropagation();onToggle(t);}} className={`mt-1 w-5 h-5 rounded-full border-2 ${cerr?"bg-emerald-500 border-emerald-500":"border-neutral-600 hover:border-neutral-300"} shrink-0 flex items-center justify-center transition`}>
        {cerr&&<span className="text-[10px] text-black">✓</span>}
      </button>
      <button onClick={()=>onClick(t)} className="flex-1 min-w-0 text-left">
        <div className="flex items-center gap-2 mb-1 flex-wrap">
          <span className="text-[10px] uppercase tracking-wider text-neutral-500">{t.categoria||"condugas"}</span>
          {t.origen==="limitless_auto"&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-purple-500/10 text-purple-300">auto</span>}
          {t.origen==="capturador"&&<span className="text-[10px] px-1.5 py-0.5 rounded bg-cyan-500/10 text-cyan-300">captura</span>}
          {!ev&&<span className="text-[10px] uppercase tracking-wider text-amber-500/70">· sin evaluar</span>}
          {dl&&<span className={`text-[10px] px-1.5 py-0.5 rounded-full ring-1 ${dl.cls}`}>{dl.label}</span>}
          {t.vencida&&<span className="text-[10px] px-1.5 py-0.5 rounded-full bg-rose-500/20 text-rose-300 ring-1 ring-rose-500/40">VENCIDA</span>}
          {t.estancada&&<span className="text-[10px] px-1.5 py-0.5 rounded-full bg-orange-500/20 text-orange-300 ring-1 ring-orange-500/30">estancada</span>}
        </div>
        <div className={`text-base font-medium ${cerr?"line-through text-neutral-500":"text-neutral-100"}`}>{t.tarea}</div>
        {t.proxima_accion&&<div className="text-xs text-neutral-400 mt-1">→ {t.proxima_accion}</div>}
        {!t.proxima_accion&&t.contexto&&<div className="text-xs text-neutral-600 mt-1 italic">{t.contexto}</div>}
      </button>
      <div className="flex flex-col items-end gap-2 shrink-0">
        {ev&&<Badge nivel={nivel} puntaje={p}/>}
        {ev&&<span className="text-[11px] text-neutral-400">{r2.a}</span>}
      </div>
    </div>
    {al.length>0&&<div className="mt-3 flex flex-wrap gap-1.5 pl-8">{al.map((a,i)=><span key={i} className="text-[10px] px-2 py-0.5 rounded-full bg-amber-500/10 text-amber-300 ring-1 ring-amber-500/30">⚠ {a.t}</span>)}</div>}
  </div>);}

function EvalModal({tarea,onClose,onSave,onDelete,onMeta}){
  const[t,setT]=useState({impacto:3,urgencia:3,consecuencia:3,arrastre:3,facilidad:3,...tarea});
  const p=calcP(t);const nivel=clasN(p);const r2=rec(t);const al=alertas(t);
  function set(k,v){setT(prev=>({...prev,[k]:v}));}
  async function save(){
    await onSave(t.id,{impacto:t.impacto,urgencia:t.urgencia,consecuencia:t.consecuencia,arrastre:t.arrastre,facilidad:t.facilidad});
    await onMeta(t.id,{tarea:t.tarea,categoria:t.categoria||"condugas",proxima_accion:t.proxima_accion||"",descripcion:t.descripcion||"",contexto:t.contexto||""});
    onClose();
  }
  return(
  <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-start sm:items-center justify-center p-3 overflow-y-auto">
    <div className="w-full max-w-3xl bg-neutral-950 border border-neutral-800 rounded-2xl shadow-2xl my-4">
      <div className="p-5 border-b border-neutral-900 flex items-start gap-3">
        <input value={t.tarea||""} onChange={e=>set("tarea",e.target.value)} className="flex-1 bg-transparent text-xl font-medium outline-none"/>
        <button onClick={onClose} className="text-neutral-500 hover:text-neutral-100 text-2xl leading-none px-2">×</button>
      </div>
      <div className="grid sm:grid-cols-2 gap-6 p-5">
        <div className="space-y-5">{CRIT.map(c=><Slider key={c.k} label={c.l} hint={c.h} value={t[c.k]} onChange={v=>set(c.k,v)}/>)}</div>
        <div className="space-y-4">
          <div className={`rounded-2xl p-5 ${NV[nivel].s} ring-1 ${NV[nivel].r}`}>
            <div className="text-xs uppercase tracking-wider text-neutral-400">Puntaje</div>
            <div className="flex items-baseline gap-2"><div className="text-5xl font-light tabular-nums">{p}</div><div className="text-sm text-neutral-500">/ 55</div></div>
            <div className="mt-2"><Badge nivel={nivel} puntaje={p}/></div>
            <div className="mt-4"><div className="text-xs uppercase tracking-wider text-neutral-400">Recomendación</div><div className="text-lg font-medium">{r2.a}</div><div className="text-xs text-neutral-400 mt-1">{r2.m}</div></div>
          </div>
          {al.length>0&&<div className="space-y-2">{al.map((a,i)=><div key={i} className="text-xs p-3 rounded-xl bg-amber-500/10 text-amber-200 ring-1 ring-amber-500/30">⚠ {a.x}</div>)}</div>}
          <div><label className="text-xs text-neutral-400">Eje</label><select value={t.categoria||"condugas"} onChange={e=>set("categoria",e.target.value)} className="w-full mt-1 bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-sm">{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label className="text-xs text-neutral-400">Fecha límite</label><input type="date" value={t.fecha_limite||""} onChange={e=>set("fecha_limite",e.target.value||null)} className="w-full mt-1 bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-sm outline-none"/></div>
          <div><label className="text-xs text-neutral-400">Próxima acción concreta (10-15 min)</label><input value={t.proxima_accion||""} onChange={e=>set("proxima_accion",e.target.value)} placeholder="¿Cuál es el primer paso ejecutable?" className="w-full mt-1 bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-sm outline-none focus:border-neutral-600"/></div>
          {t.contexto&&<div><label className="text-xs text-neutral-400">Contexto</label><textarea value={t.contexto||""} onChange={e=>set("contexto",e.target.value)} rows="2" className="w-full mt-1 bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-xs text-neutral-400 outline-none resize-none"/></div>}
        </div>
      </div>
      <div className="p-5 border-t border-neutral-900 flex items-center justify-between">
        <button onClick={()=>{if(confirm("¿Eliminar?"))onDelete(t.id);}} className="text-xs text-neutral-500 hover:text-rose-400">Eliminar</button>
        <div className="flex gap-2"><button onClick={onClose} className="px-4 py-2 rounded-lg text-sm text-neutral-300 hover:bg-neutral-900">Cancelar</button><button onClick={save} className="px-5 py-2 rounded-lg bg-white text-black text-sm font-medium hover:bg-neutral-200">Guardar</button></div>
      </div>
    </div>
  </div>);}

function Summary({tareas}){
  const counts=useMemo(()=>{const c={maxima:0,alta:0,media:0,baja:0,sin:0,vencidas:0};
    tareas.forEach(t=>{if(t.estado==="cerrada")return;if(!t.evaluada)c.sin++;else c[t.nivel||clasN(calcP(t))]++;if(t.vencida||t.fecha_limite&&t.fecha_limite<new Date().toISOString().slice(0,10))c.vencidas++;});return c;},[tareas]);
  return(
  <div className="grid grid-cols-3 sm:grid-cols-6 gap-2">
    {[["Máxima","maxima"],["Alta","alta"],["Media","media"],["Baja","baja"]].map(([l,k])=>{const n=NV[k];return(
      <div key={k} className={`rounded-xl p-3 ${n.s} ring-1 ${n.r}`}><div className="text-[10px] uppercase tracking-wider text-neutral-400">{l}</div><div className={`text-2xl font-light ${n.t}`}>{counts[k]}</div></div>);})}
    <div className="rounded-xl p-3 bg-neutral-900/60 ring-1 ring-neutral-800"><div className="text-[10px] uppercase tracking-wider text-neutral-400">Sin evaluar</div><div className="text-2xl font-light text-neutral-300">{counts.sin}</div></div>
    {counts.vencidas>0&&<div className="rounded-xl p-3 bg-rose-500/10 ring-1 ring-rose-500/40"><div className="text-[10px] uppercase tracking-wider text-rose-400">Vencidas</div><div className="text-2xl font-light text-rose-300">{counts.vencidas}</div></div>}
  </div>);}

function BriefingHoy({briefing}){
  if(!briefing||!briefing.top_3)return null;
  return(
  <div className="glass border border-neutral-800 rounded-2xl p-5 space-y-4">
    <div className="text-sm font-medium text-neutral-100">{briefing.saludo||"Briefing del día"}</div>
    {briefing.supervivencia?.length>0&&<div className="space-y-1">{briefing.supervivencia.map((s,i)=><div key={i} className="text-xs p-3 rounded-xl bg-rose-500/15 text-rose-200 ring-1 ring-rose-500/30 font-medium">🔴 {s}</div>)}</div>}
    <div>
      <div className="text-xs uppercase tracking-wider text-neutral-400 mb-2">Top 3 de hoy</div>
      {briefing.top_3.map((t,i)=>(
        <div key={i} className="flex items-start gap-3 mb-2">
          <span className="text-lg font-light text-neutral-500 w-6">{i+1}</span>
          <div><div className="text-sm font-medium">{t.tarea}</div><div className="text-[10px] text-neutral-500">{t.categoria} · {t.porque}</div></div>
        </div>))}
    </div>
    {briefing.mega_dia&&<div className="rounded-xl p-4 bg-purple-500/10 ring-1 ring-purple-500/30"><div className="text-[10px] uppercase tracking-wider text-purple-400">MEGA del día</div><div className="text-base font-medium text-purple-200">{briefing.mega_dia}</div></div>}
    {briefing.contactar_hoy?.length>0&&<div><div className="text-xs uppercase tracking-wider text-neutral-400 mb-1">Contactar hoy</div>{briefing.contactar_hoy.map((c,i)=><div key={i} className="text-xs text-neutral-300">→ {c.persona}: {c.motivo}</div>)}</div>}
    {briefing.ojo_con?.length>0&&<div><div className="text-xs uppercase tracking-wider text-neutral-400 mb-1">Ojo con</div>{briefing.ojo_con.map((o,i)=><div key={i} className="text-xs text-amber-300">⚠ {o}</div>)}</div>}
    {briefing.frase_dia&&<div className="text-xs text-neutral-500 italic border-t border-neutral-900 pt-3">"{briefing.frase_dia}"</div>}
  </div>);}

function Filters({filtros,setFiltros}){return(
  <div className="flex flex-wrap gap-2 text-xs">
    <select value={filtros.categoria} onChange={e=>setFiltros({...filtros,categoria:e.target.value})} className="bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1.5"><option value="">Categorías</option>{CATS.map(c=><option key={c}>{c}</option>)}</select>
    <select value={filtros.nivel} onChange={e=>setFiltros({...filtros,nivel:e.target.value})} className="bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1.5"><option value="">Niveles</option>{Object.keys(NV).map(k=><option key={k} value={k}>{NV[k].l}</option>)}</select>
    <select value={filtros.estado} onChange={e=>setFiltros({...filtros,estado:e.target.value})} className="bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1.5"><option value="">Estados</option><option value="abierta">Abiertas</option><option value="cerrada">Cerradas</option></select>
    <select value={filtros.origen} onChange={e=>setFiltros({...filtros,origen:e.target.value})} className="bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1.5"><option value="">Orígenes</option><option value="limitless">Limitless</option><option value="limitless_auto">Auto-promote</option><option value="manual">Manual</option><option value="capturador">Captura</option></select>
    <select value={filtros.extra} onChange={e=>setFiltros({...filtros,extra:e.target.value})} className="bg-neutral-900 border border-neutral-800 rounded-lg px-2 py-1.5"><option value="">Especial</option><option value="vencida">Vencidas</option><option value="estancada">Estancadas</option><option value="sin_evaluar">Sin evaluar</option></select>
  </div>);}

// --- MODO FOCUS ---
function FocusMode({tarea,onClose,onToggle}){
  if(!tarea)return null;
  const p=calcP(tarea);const nivel=clasN(p);const r2=rec(tarea);
  return(
  <div className="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center p-8">
    <button onClick={onClose} className="absolute top-6 right-6 text-neutral-600 hover:text-neutral-300 text-sm">Salir</button>
    <div className="text-[10px] uppercase tracking-[0.3em] text-neutral-600 mb-4">SIGUIENTE ACCIÓN</div>
    <div className="text-3xl sm:text-4xl font-light text-center max-w-2xl leading-snug mb-6">{tarea.tarea}</div>
    {tarea.proxima_accion&&<div className="text-lg text-neutral-400 mb-8 text-center">→ {tarea.proxima_accion}</div>}
    <Badge nivel={nivel} puntaje={p}/>
    <div className="text-sm text-neutral-500 mt-2">{r2.a}</div>
    <button onClick={()=>{onToggle(tarea);onClose();}} className="mt-12 px-8 py-3 rounded-xl bg-emerald-600 text-white font-medium hover:bg-emerald-500 transition">Hecha</button>
  </div>);}

// --- BRIEFING AYER ---
function BriefingAyer({data}){
  if(!data||!data.fecha)return null;
  return(
  <details className="glass border border-neutral-800 rounded-2xl overflow-hidden">
    <summary className="p-4 cursor-pointer text-sm text-neutral-300 hover:text-neutral-100">Resumen del {data.fecha} — {data.tareas_extraidas?.length||0} tareas, {data.decisiones?.length||0} decisiones, {data.ideas?.length||0} ideas</summary>
    <div className="p-4 pt-0 space-y-3">
      {data.decisiones?.length>0&&<div><div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Decisiones</div>{data.decisiones.map((d,i)=><div key={i} className="text-xs text-neutral-300 mb-1">• {d}</div>)}</div>}
      {data.ideas?.length>0&&<div><div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Ideas</div>{data.ideas.map((d,i)=><div key={i} className="text-xs text-cyan-300 mb-1">• {d}</div>)}</div>}
      {data.frases?.length>0&&<div><div className="text-[10px] uppercase tracking-wider text-neutral-400 mb-1">Frases</div>{data.frases.map((d,i)=><div key={i} className="text-xs text-neutral-400 italic mb-1">"{d}"</div>)}</div>}
      {data.alertas_supervivencia?.length>0&&<div>{data.alertas_supervivencia.map((a,i)=><div key={i} className="text-xs p-2 rounded-lg bg-rose-500/10 text-rose-300 ring-1 ring-rose-500/30 mb-1">🔴 {a}</div>)}</div>}
    </div>
  </details>);}

// --- RESUMEN SEMANA ---
function SemanaPanel({data}){
  if(!data||!data.semana)return null;
  const m=data.metricas_tracker||{};const t=data.totales_semana||{};
  return(
  <details className="glass border border-neutral-800 rounded-2xl overflow-hidden">
    <summary className="p-4 cursor-pointer text-sm text-neutral-300 hover:text-neutral-100">Semana {data.semana} ({data.periodo}) — creadas:{m.creadas_semana} cerradas:{m.cerradas_semana} ratio:{m.ratio_cierre}%</summary>
    <div className="p-4 pt-0">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
        <div className="rounded-lg p-2 bg-neutral-900"><div className="text-[10px] text-neutral-500">Creadas</div><div className="text-lg font-light">{m.creadas_semana||0}</div></div>
        <div className="rounded-lg p-2 bg-neutral-900"><div className="text-[10px] text-neutral-500">Cerradas</div><div className="text-lg font-light text-emerald-400">{m.cerradas_semana||0}</div></div>
        <div className="rounded-lg p-2 bg-neutral-900"><div className="text-[10px] text-neutral-500">Abiertas</div><div className="text-lg font-light">{m.abiertas_total||0}</div></div>
        <div className="rounded-lg p-2 bg-neutral-900"><div className="text-[10px] text-neutral-500">% cierre</div><div className="text-lg font-light">{m.ratio_cierre||0}%</div></div>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
        <div className="text-xs text-neutral-400">Tareas detectadas: <span className="text-neutral-200">{t.tareas_detectadas||0}</span></div>
        <div className="text-xs text-neutral-400">Decisiones: <span className="text-neutral-200">{t.decisiones||0}</span></div>
        <div className="text-xs text-neutral-400">Ideas: <span className="text-cyan-300">{t.ideas||0}</span></div>
        <div className="text-xs text-neutral-400">Alertas: <span className="text-rose-300">{t.alertas||0}</span></div>
      </div>
    </div>
  </details>);}

// --- EXPORT/IMPORT ---
function ExportImport({tareas,onImport}){
  function doExport(){
    const blob=new Blob([JSON.stringify({tareas,exported_at:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tracker-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
  }
  function doImport(e){
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.tareas&&confirm(`Importar ${d.tareas.length} tareas? Esto REEMPLAZA todo.`)){onImport(d.tareas);}}catch{alert("JSON inválido");}};r.readAsText(f);
  }
  return(
  <div className="flex gap-2">
    <button onClick={doExport} className="text-xs text-neutral-500 hover:text-neutral-200 px-2 py-1 rounded border border-neutral-800">Exportar</button>
    <label className="text-xs text-neutral-500 hover:text-neutral-200 px-2 py-1 rounded border border-neutral-800 cursor-pointer">Importar<input type="file" accept=".json" onChange={doImport} className="hidden"/></label>
  </div>);}

function App(){
  const[tareas,setTareas]=useState([]);
  const[briefing,setBriefing]=useState(null);
  const[briefingAyer,setBriefingAyer]=useState(null);
  const[semana,setSemana]=useState(null);
  const[editando,setEditando]=useState(null);
  const[focusMode,setFocusMode]=useState(false);
  const[tab,setTab]=useState("hoy");
  const[filtros,setFiltros]=useState({categoria:"",nivel:"",estado:"abierta",origen:"",extra:""});
  const[busy,setBusy]=useState(false);
  const[error,setError]=useState("");

  const load=useCallback(async()=>{
    try{
      const[d,b,ba,s]=await Promise.all([
        apiGet("/tareas-tracker.json"),
        apiGet("/briefing-hoy.json").catch(()=>null),
        apiGet("/briefing-ayer.json").catch(()=>null),
        apiGet("/briefing-semana.json").catch(()=>null),
      ]);
      setTareas(d.tareas||[]);setBriefing(b);setBriefingAyer(ba);setSemana(s);setError("");
    }catch(e){setError(e.message);}
  },[]);

  useEffect(()=>{load();const id=setInterval(load,REFRESH_MS);return()=>clearInterval(id);},[load]);
  useEffect(()=>{document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")load();});},[load]);

  async function add(titulo,cat){setBusy(true);try{await apiPost("/create",{tarea:titulo,categoria:cat});await load();}catch(e){setError(e.message);}finally{setBusy(false);}}
  async function score(id,body){try{await apiPost("/score",{id,...body});await load();}catch(e){setError(e.message);}}
  async function meta(id,body){try{await apiPost("/update",{id,...body});}catch(e){setError(e.message);}}
  async function toggle(t){try{await apiPost("/toggle",{id:t.id});await load();}catch(e){setError(e.message);}}
  async function remove(id){try{await apiPost("/delete",{id});setEditando(null);await load();}catch(e){setError(e.message);}}

  const abiertas=tareas.filter(t=>t.estado!=="cerrada");
  const sinEval=abiertas.filter(t=>!t.evaluada);
  const evaluadas=sortPri(abiertas.filter(t=>t.evaluada));
  const top5=evaluadas.slice(0,5);

  const filtradas=useMemo(()=>{
    return sortPri(tareas).filter(t=>{
      if(filtros.categoria&&(t.categoria||"condugas")!==filtros.categoria)return false;
      if(filtros.estado&&t.estado!==filtros.estado)return false;
      if(filtros.origen&&t.origen!==filtros.origen)return false;
      if(filtros.nivel){if(!t.evaluada)return false;if((t.nivel||clasN(calcP(t)))!==filtros.nivel)return false;}
      if(filtros.extra==="vencida"&&!t.vencida)return false;
      if(filtros.extra==="estancada"&&!t.estancada)return false;
      if(filtros.extra==="sin_evaluar"&&t.evaluada)return false;
      return true;
    });
  },[tareas,filtros]);

  return(
  <div className="min-h-screen max-w-5xl mx-auto px-4 sm:px-6 py-8">
    <header className="flex items-center justify-between mb-8">
      <div><div className="text-[11px] uppercase tracking-[0.2em] text-neutral-500">Priorizador · tracker real</div><h1 className="text-2xl font-light">¿Qué hago primero?</h1></div>
      <nav className="flex gap-1 text-sm items-center flex-wrap">
        {[["hoy","Hoy"],["dashboard","Vista"],["lista","Todas"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} className={`px-3 py-1.5 rounded-lg transition ${tab===k?"bg-neutral-800 text-white":"text-neutral-500 hover:text-neutral-200"}`}>{l}</button>))}
        {top5.length>0&&<button onClick={()=>setFocusMode(true)} className="px-3 py-1.5 rounded-lg bg-purple-500/15 text-purple-300 ring-1 ring-purple-500/30 hover:bg-purple-500/25 transition">Focus</button>}
        <a href="/" className="px-3 py-1.5 rounded-lg text-neutral-500 hover:text-neutral-200 transition">← Dash</a>
      </nav>
    </header>

    {error&&<div className="mb-4 text-xs p-3 rounded-lg bg-rose-500/10 text-rose-300 ring-1 ring-rose-500/30">⚠ {error}</div>}

    <section className="mb-6"><QuickCapture onAdd={add} busy={busy}/></section>

    {tab==="hoy"&&(
      <>
        <BriefingHoy briefing={briefing}/>
        <div className="mt-6"><Summary tareas={abiertas}/></div>
        {sinEval.length>0&&(
          <section className="mt-6">
            <div className="flex items-center justify-between mb-3"><h2 className="text-sm uppercase tracking-wider text-neutral-400">Sin evaluar · {sinEval.length}</h2><span className="text-xs text-neutral-600">Click para priorizar</span></div>
            <div className="grid sm:grid-cols-2 gap-3">{sinEval.slice(0,6).map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle}/>)}</div>
            {sinEval.length>6&&<div className="text-center mt-2"><button onClick={()=>setTab("lista")} className="text-xs text-neutral-500 hover:text-neutral-200">Ver todas ({sinEval.length})</button></div>}
          </section>)}
        <div className="mt-6 space-y-3">
          <BriefingAyer data={briefingAyer}/>
          <SemanaPanel data={semana}/>
        </div>
      </>)}

    {tab==="dashboard"&&(
      <>
        <Summary tareas={abiertas}/>
        <section className="mt-6"><h2 className="text-sm uppercase tracking-wider text-neutral-400 mb-3">Top prioridades</h2>
          {top5.length===0?<div className="text-center py-12 text-neutral-600 text-sm border border-dashed border-neutral-800 rounded-2xl">{tareas.length===0?"Sin tareas.":"Evalúa tareas para ver prioridades."}</div>
          :<div className="space-y-3">{top5.map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle}/>)}</div>}
        </section>
      </>)}

    {tab==="lista"&&(
      <>
        <Filters filtros={filtros} setFiltros={setFiltros}/>
        <section className="mt-4 space-y-3">
          {filtradas.length===0?<div className="text-center py-12 text-neutral-600 text-sm border border-dashed border-neutral-800 rounded-2xl">Sin resultados.</div>
          :filtradas.map(t=><TaskRow key={t.id} t={t} onClick={setEditando} onToggle={toggle}/>)}
        </section>
      </>)}

    {editando&&<EvalModal tarea={editando} onClose={()=>setEditando(null)} onSave={score} onDelete={remove} onMeta={meta}/>}
    {focusMode&&top5.length>0&&<FocusMode tarea={top5[0]} onClose={()=>setFocusMode(false)} onToggle={toggle}/>}

    <footer className="mt-16 flex items-center justify-between text-[10px] text-neutral-700">
      <span>{tareas.length} tareas · refresh {REFRESH_MS/1000}s</span>
      <ExportImport tareas={tareas} onImport={async(ts)=>{/* TODO: bulk import via API */alert("Import API pendiente");}}/>
    </footer>
  </div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
