<style>

body { font-family: 'Segoe UI', system-ui, sans-serif; background: #07090d; color: #e2e8f0; overflow: hidden; }

#controls {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: rgba(7,9,13,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid #1e2a3a; padding: 10px 16px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
#controls h1 { font-size: 16px; font-weight: 500; color: #06b6d4; margin-right: auto; }
.filter-btn {
  background: #141a24; border: 1px solid #1e2a3a; color: #64748b;
  padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { border-color: #06b6d4; color: #06b6d4; background: rgba(6,182,212,0.1); }
.filter-btn.all.active { border-color: #f97316; color: #f97316; background: rgba(249,115,22,0.1); }

#info-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: rgba(7,9,13,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid #1e2a3a; padding: 16px 20px;
  transform: translateY(100%); transition: transform 0.3s ease;
  max-height: 40vh; overflow-y: auto;
}
#info-panel.open { transform: translateY(0); }
#info-panel h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
#info-panel .type { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
#info-panel .detail { font-size: 13px; color: #94a3b8; line-height: 1.6; }
#info-panel .connections { margin-top: 8px; }
#info-panel .conn-tag {
  display: inline-block; font-size: 11px; background: #141a24; border: 1px solid #1e2a3a;
  border-radius: 4px; padding: 2px 8px; margin: 2px 4px 2px 0; color: #94a3b8;
}
#close-panel {
  position: absolute; top: 12px; right: 16px; background: none; border: none;
  color: #64748b; font-size: 20px; cursor: pointer;
}

svg { width: 100vw; height: 100vh; display: block; }
</style>
</head>

<div id="controls">
  <h1>Mapa Neuronal SER.SIENDO</h1>

  serjefe: "#8b5cf6",
  patrimonio: "#22c55e",
  familia: "#f472b6",

const typeColors = {
  persona: 1, empresa: 0.9, proyecto: 0.7, concepto: 0.85,
  cliente: 0.65, prospecto: 0.5, marca: 0.9, producto: 0.7,
  área: 0.85, herramienta: 0.6
};

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#graph").attr("width", W).attr("height", H);

const g = svg.append("g");

// Zoom
svg.call(d3.zoom().scaleExtent([0.3, 4]).on("zoom", (e) => {
  g.attr("transform", e.transform);
}));

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(d => {
    const s = nodes.find(n=>n.id===d.source.id||n.id===d.source);
    const t = nodes.find(n=>n.id===d.target.id||n.id===d.target);
    return (s&&t) ? (s.r||15)+(t.r||15)+30 : 80;
  }).strength(d => d.strength || 0.3))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(d=>d.r+8))
  .force("x", d3.forceX(W/2).strength(0.05))
  .force("y", d3.forceY(H/2).strength(0.05));

const link = g.append("g").selectAll("line")
  .data(links).join("line")
  .attr("stroke", "#1e2a3a").attr("stroke-width", 0.5).attr("stroke-opacity", 0.6);

const node = g.append("g").selectAll("g")
  .data(nodes).join("g")
  .attr("cursor", "pointer")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end", (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  );

node.append("circle")
  .attr("r", d=>d.r)
  .attr("fill", d=> colors[d.group] || "#64748b")
  .attr("fill-opacity", d=> typeColors[d.type] || 0.7)
  .attr("stroke", d=> colors[d.group] || "#64748b")
  .attr("stroke-width", d=> d.id==="sebastian" ? 2 : 0.5)
  .attr("stroke-opacity", 0.8);

node.append("text")
  .text(d=>d.label)
  .attr("text-anchor", "middle")
  .attr("dy", d=> d.r > 18 ? "0.35em" : d.r+12+"px")
  .attr("fill", d=> d.r > 18 ? "#fff" : "#94a3b8")
  .attr("font-size", d=> d.r > 20 ? "11px" : d.r > 15 ? "10px" : "9px")
  .attr("font-weight", d=> d.r > 18 ? "600" : "400")
  .attr("pointer-events", "none");

node.on("click", (e, d) => {
  e.stopPropagation();
  document.getElementById("panel-name").textContent = d.label;
  document.getElementById("panel-type").textContent = d.type + " · " + d.group;
  document.getElementById("panel-type").style.color = colors[d.group] || "#64748b";
  document.getElementById("panel-detail").textContent = d.detail || "";

  const conns = links.filter(l => (l.source.id||l.source)===d.id || (l.target.id||l.target)===d.id);
  const connNames = conns.map(l => {
    const otherId = (l.source.id||l.source)===d.id ? (l.target.id||l.target) : (l.source.id||l.source);
    const other = nodes.find(n=>n.id===otherId);
    return other ? other.label : otherId;
  });
  document.getElementById("panel-connections").innerHTML =
    "<strong style='font-size:12px;color:#64748b'>Conexiones:</strong><br>" +
    connNames.map(n=>"<span class='conn-tag'>"+n+"</span>").join("");
  document.getElementById("info-panel").classList.add("open");

  // Highlight
  node.select("circle").attr("opacity", n => {
    if(n.id===d.id) return 1;
    const connected = conns.some(l=> (l.source.id||l.source)===n.id || (l.target.id||l.target)===n.id);
    return connected ? 0.9 : 0.15;
  });
  node.select("text").attr("opacity", n => {
    if(n.id===d.id) return 1;
    const connected = conns.some(l=> (l.source.id||l.source)===n.id || (l.target.id||l.target)===n.id);
    return connected ? 1 : 0.1;
  });
  link.attr("stroke-opacity", l => {
    return (l.source.id===d.id || l.target.id===d.id) ? 0.8 : 0.05;
  }).attr("stroke", l => {
    return (l.source.id===d.id || l.target.id===d.id) ? (colors[d.group]||"#64748b") : "#1e2a3a";
  });
});

svg.on("click", () => { resetHighlight(); closePanel(); });

function resetHighlight() {
  node.select("circle").attr("opacity", 1);
  node.select("text").attr("opacity", 1);
  link.attr("stroke-opacity", 0.6).attr("stroke", "#1e2a3a");
}

function closePanel() {
  document.getElementById("info-panel").classList.remove("open");
  resetHighlight();
}

function filterGroup(group) {
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  if(group==="all") {
    node.attr("display", "block");
    link.attr("display", "block");
    resetHighlight();
    return;
  }

  node.attr("display", d => (d.group===group || d.id==="sebastian") ? "block" : "none");
  link.attr("display", l => {
    const sg = (l.source.group||"");
    const tg = (l.target.group||"");
    return (sg===group || tg===group || l.source.id==="sebastian" || l.target.id==="sebastian") ? "block" : "none";
  });
}

simulation.on("tick", () => {
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform", d=>`translate(${d.x},${d.y})`);
});
</script>
</body>
</html>
