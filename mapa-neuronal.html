  --accent: #dbc078;
  --accent-deep: #b89949;
  --gold-soft: #e6d3a0;
  --alive: #5a8a5e;
  --warm: #c9a052;
  --cold: #8a8a86;

body{font-family:'Inter','DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow:hidden}

.fb{background:transparent;border:1px solid var(--line);color:var(--ink-mid);padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'Inter',system-ui,sans-serif}
.fb:hover,.fb.on{border-color:var(--accent-deep);color:var(--accent-deep);background:rgba(184,153,73,0.10)}
.fb.all.on{border-color:var(--accent-deep);color:var(--accent-deep);background:rgba(184,153,73,0.14)}
.fb.dead.on{border-color:var(--dead);color:var(--dead);background:rgba(184,92,74,0.10)}
.fb.alive.on{border-color:var(--alive);color:var(--alive);background:rgba(90,138,94,0.10)}
.sep{width:1px;height:16px;background:var(--line);margin:0 2px}

.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lr{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:2px solid;background:transparent}

#ip .act.dead{background:rgba(184,92,74,0.08);border:1px solid rgba(184,92,74,0.20);color:var(--dead)}

#ip .hab.O{border-left-color:var(--socio)}
#ip .hab.T{border-left-color:var(--accent-deep)}

#ip .hab .hbadge.O{background:rgba(184,153,73,0.15);color:var(--socio)}
#ip .hab .hbadge.T{background:rgba(184,153,73,0.15);color:var(--accent-deep)}

#ip .tg{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}

#stats .sl{font-size:9px;text-transform:uppercase;letter-spacing:0.05em}

svg{width:100vw;height:100vh;display:block;background:var(--bg)}

@keyframes pulse{0%,100%{filter:drop-shadow(0 0 3px currentColor)}50%{filter:drop-shadow(0 0 12px currentColor)}}

/* Scrollbar canon */
#ip::-webkit-scrollbar{width:6px}
#ip::-webkit-scrollbar-track{background:transparent}
#ip::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
#ip::-webkit-scrollbar-thumb:hover{background:var(--accent-deep)}

// === NEURAL ACTIVITY ENGINE ===
let nodeActivity = {};  // Will be populated from neural-activity.json

function daysSince(dateStr) {
    if (!dateStr) return 999;
    const d = new Date(dateStr);
    const now = new Date();
    return Math.floor((now - d) / (1000 * 60 * 60 * 24));
}

// Freshness: 1.0 = today, decays over time
function freshness(nodeId) {
    if (nodeId === "sebastian") return 1.0;  // Sebastian never dies
    const info = nodeActivity[nodeId];
    if (!info || !info.last_seen) return 0.08;  // Never seen = nearly dead
    const days = daysSince(info.last_seen);
    if (days <= 0) return 1.0;    // Today - fully alive
    if (days <= 3) return 0.85;   // Last 3 days - very alive
    if (days <= 7) return 0.65;   // Last week - alive
    if (days <= 14) return 0.45;  // Two weeks - fading
    if (days <= 30) return 0.25;  // Month - cold
    return 0.1;                    // 30+ days - nearly dead
}

function lifeState(nodeId) {
    const f = freshness(nodeId);
    if (f >= 0.8) return "alive";
    if (f >= 0.5) return "warm";
    if (f >= 0.2) return "cold";
    return "dead";
}

function lifeLabel(nodeId) {
    const info = nodeActivity[nodeId];
    if (!info || !info.last_seen) return "Sin actividad registrada";
    const days = daysSince(info.last_seen);
    const mentions = info.mentions_total || 0;
    if (days === 0) return "Activo HOY · " + mentions + " menciones totales";
    if (days === 1) return "Activo ayer · " + mentions + " menciones";
    if (days <= 7) return "Hace " + days + " días · " + mentions + " menciones";
    if (days <= 30) return "Hace " + days + " días — enfriándose · " + mentions + " menciones";
    return "Hace " + days + " días — neurona muriendo · " + mentions + " menciones";
}

function lifeClass(nodeId) {
    const s = lifeState(nodeId);
    if (s === "alive") return "fresh";
    if (s === "warm") return "warm";
    if (s === "cold") return "cold";
    return "dead";
}

// Scale radius based on freshness
function adjustedRadius(d) {
    const f = freshness(d.id);
    const minScale = 0.5;
    const scale = minScale + (1 - minScale) * f;
    return d.r * scale;
}

function sty(d){
    let f=GC[d.g]||"#8a8a86",sk=f,sw=0.5,op=0.78,da="",ri=null;
    if(d.tp==="persona"){op=0.9}
    if(d.tp==="empresa"||d.tp==="marca"){op=0.95;sw=1.5}
    if(d.tp==="concepto"){op=0.7}
    if(d.tp==="contrato"){f="transparent";sw=2;op=1;da="4 2"}
    if(d.tp==="cliente"){f="#091f2e";sk="#3d4f5e";op=0.82}
    if(d.tp==="socio"){f="#091f2e";sk="#dbc078";sw=2;op=0.9}
    if(d.tp==="crisis"){f="#8e3e2f";sk="#b85c4a";sw=2;op=1}
    if(d.tp==="prospecto"){op=0.4;da="3 3";f="transparent"}
    if(d.tp==="proceso"){op=0.6;da="2 2"}
    if(d.tp==="herramienta"){op=0.5}
    if(d.tp==="área"){op=0.85;sw=1}
    if(d.st==="crisis")ri="#b85c4a";
    if(d.st==="hacer")ri="#c9a052";
    if(d.st==="delegar")ri="#4a6b7c";

    // Apply neural decay
    const fr = freshness(d.id);
    op = op * (0.15 + 0.85 * fr);  // Never fully invisible, min 15% of base opacity

    return{f,sk,sw,op,da,ri}
}

// Load activity data and render
async function init() {
    try {
        const resp = await fetch('/data/neural-activity.json?t=' + Date.now());
        if (resp.ok) {
            const data = await resp.json();
            nodeActivity = data.nodes || {};
            console.log("Neural activity loaded:", Object.keys(nodeActivity).length, "nodes");
        }
    } catch(e) {
        console.warn("No neural activity data yet, using defaults", e);
    }
    // Load project detail data
    try {
        const resp2 = await fetch('/data/proyectos-detail.json?t=' + Date.now());
        if (resp2.ok) {
            window._projDetail = await resp2.json();
            console.log("Project detail loaded");
        }
    } catch(e) {
        console.warn("No project detail data", e);
    }
    render();
    updateStats();
}

function updateStats() {
    let alive=0, warm=0, cold=0, dead=0;
    N.forEach(n => {
        const s = lifeState(n.id);
        if (s==="alive") alive++;
        else if (s==="warm") warm++;
        else if (s==="cold") cold++;
        else dead++;
    });
    document.getElementById("s-alive").textContent = alive;
    document.getElementById("s-warm").textContent = warm;
    document.getElementById("s-cold").textContent = cold;
    document.getElementById("s-dead").textContent = dead;
}

function render() {

      return 0.1 + 0.5 * Math.min(sf, tf);
  });

const nd=g.append("g").selectAll("g").data(N).join("g").attr("cursor","pointer")

// Status ring (crisis/hacer/delegar)

// Main node circle
nd.append("circle")

        d3.select(this)

// Labels

function rH(){

        const tf = freshness(d.target.id || d.target);
        return 0.1 + 0.5 * Math.min(sf, tf);
    }).attr("stroke","#1e293b");
}

// NEW: Filter by life state
function fLife(state, btn) {
    cl(); btn.classList.add("on");
    if (state === "alive") {
        nd.attr("display", d => (freshness(d.id) >= 0.5 || d.id==="sebastian") ? "block" : "none");
    } else {
        nd.attr("display", d => (freshness(d.id) < 0.5 && d.id!=="sebastian") ? "block" : "none");
    }
    lk.attr("display", "none");
}
