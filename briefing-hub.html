<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing — SER.SIENDO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090d;
  --bg2: #0c1017;
  --bg3: #111827;
  --cyan: #06b6d4;
  --orange: #f97316;
  --red: #ef4444;
  --green: #22c55e;
  --yellow: #eab308;
  --purple: #a78bfa;
  --text: #e2e8f0;
  --muted: #64748b;
  --border: #1e293b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* Navigation */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(7, 9, 13, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  gap: 0.25rem;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0.5rem 0;
}

.nav-inner::-webkit-scrollbar { display: none; }

.nav-btn {
  background: transparent;
  color: var(--muted);
  border: 1px solid transparent;
  padding: 0.4rem 0.85rem;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  position: relative;
}

.nav-btn:hover { color: var(--text); background: var(--bg3); }
.nav-btn.active { color: var(--cyan); border-color: var(--cyan); background: rgba(6, 182, 212, 0.06); }

.nav-badge {
  position: absolute;
  top: -4px;
  right: -4px;
  background: var(--red);
  color: #fff;
  font-size: 0.6rem;
  font-family: 'JetBrains Mono', monospace;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

/* Layout */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem 1rem 6rem;
}

section { margin-bottom: 3rem; scroll-margin-top: 4rem; display: none; }
section.active { display: block; }

/* Header */
.header-block { padding: 2rem 0 1rem; }

.header-block h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(1.2rem, 3vw, 1.6rem);
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--cyan);
}

.header-block h1 span { color: var(--muted); font-weight: 300; }

.header-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 0.35rem;
}

/* Section titles */
.section-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.6rem;
  color: var(--text);
  margin-bottom: 1.25rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.section-title .accent { color: var(--cyan); }

.title-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 0.1rem 0.5rem;
  border-radius: 10px;
  color: var(--muted);
}

/* Cards */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  margin-bottom: 0.75rem;
  transition: border-color 0.2s;
}

.card:hover { border-color: rgba(100, 116, 139, 0.3); }

.card-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

/* Mental state */
.mental-card {
  background: linear-gradient(135deg, rgba(6, 182, 212, 0.08), rgba(167, 139, 250, 0.06));
  border-color: rgba(6, 182, 212, 0.2);
  padding: 1.5rem;
}

.mental-card .mental-text {
  font-family: 'Instrument Serif', serif;
  font-size: 1.15rem;
  font-style: italic;
  color: var(--text);
  line-height: 1.7;
}

/* Badges */
.badge {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.15rem 0.55rem;
  border-radius: 4px;
  line-height: 1.4;
}

.badge-critica { background: rgba(239, 68, 68, 0.15); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.3); }
.badge-alta { background: rgba(249, 115, 22, 0.15); color: var(--orange); border: 1px solid rgba(249, 115, 22, 0.3); }
.badge-media { background: rgba(234, 179, 8, 0.15); color: var(--yellow); border: 1px solid rgba(234, 179, 8, 0.3); }
.badge-baja { background: rgba(34, 197, 94, 0.15); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.3); }

.badge-compromiso { background: rgba(239, 68, 68, 0.12); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.25); }
.badge-pendiente { background: rgba(249, 115, 22, 0.12); color: var(--orange); border: 1px solid rgba(249, 115, 22, 0.25); }
.badge-idea_accionable { background: rgba(167, 139, 250, 0.12); color: var(--purple); border: 1px solid rgba(167, 139, 250, 0.25); }
.badge-seguimiento { background: rgba(6, 182, 212, 0.12); color: var(--cyan); border: 1px solid rgba(6, 182, 212, 0.25); }

/* Candidate task cards */
.candidate-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.15rem;
  margin-bottom: 0.5rem;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.candidate-card:hover { border-color: rgba(100, 116, 139, 0.4); }

.candidate-card.fade-out {
  opacity: 0;
  transform: translateX(-30px);
  max-height: 0;
  padding: 0 1.15rem;
  margin-bottom: 0;
  border-width: 0;
}

.candidate-card.accepted {
  border-color: rgba(34, 197, 94, 0.4);
  background: rgba(34, 197, 94, 0.05);
}

.candidate-text {
  font-size: 0.9rem;
  font-style: italic;
  color: var(--text);
  margin-bottom: 0.5rem;
}

.candidate-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.6rem;
}

.candidate-meta .responsable { color: var(--purple); }

.candidate-context {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.6rem;
  font-style: italic;
}

.candidate-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

.btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 0.35rem 0.85rem;
  border-radius: 6px;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}

.btn-accept {
  background: rgba(34, 197, 94, 0.12);
  color: var(--green);
  border-color: rgba(34, 197, 94, 0.3);
}

.btn-accept:hover {
  background: rgba(34, 197, 94, 0.25);
  border-color: var(--green);
}

.btn-reject {
  background: rgba(100, 116, 139, 0.1);
  color: var(--muted);
  border-color: rgba(100, 116, 139, 0.2);
}

.btn-reject:hover {
  background: rgba(239, 68, 68, 0.15);
  color: var(--red);
  border-color: rgba(239, 68, 68, 0.3);
}

.btn-bulk {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  padding: 0.3rem 0.75rem;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}

.btn-bulk:hover { color: var(--text); border-color: var(--muted); }
.btn-bulk.accept-all:hover { color: var(--green); border-color: var(--green); }
.btn-bulk.reject-all:hover { color: var(--red); border-color: var(--red); }

/* Task cards (tracker) */
.task-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.15rem;
  margin-bottom: 0.5rem;
  transition: all 0.2s;
  position: relative;
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
}

.task-card:hover { border-color: rgba(100, 116, 139, 0.4); }
.task-card.cerrada { opacity: 0.55; }
.task-card.cerrada .task-text { text-decoration: line-through; }

.task-checkbox {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--muted);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
  transition: all 0.2s;
  background: transparent;
}

.task-checkbox:hover { border-color: var(--cyan); }
.task-card.cerrada .task-checkbox { border-color: var(--green); background: rgba(34, 197, 94, 0.15); }
.task-card.cerrada .task-checkbox::after { content: "\2713"; color: var(--green); font-size: 0.7rem; }

.task-body { flex: 1; }

.task-text { font-size: 0.9rem; margin-bottom: 0.4rem; color: var(--text); }

.task-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  font-size: 0.75rem;
  color: var(--muted);
}

.task-meta .responsable { color: var(--purple); }

/* Columns */
.columns { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
@media (min-width: 768px) { .columns { grid-template-columns: 1fr 1fr; } }

.column-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 1rem;
}

.column-header h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.06em;
}

.count-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 0.1rem 0.5rem;
  border-radius: 10px;
  color: var(--muted);
}

/* Collapsible */
.collapsible-trigger {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 0.75rem 1rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  margin-bottom: 0.5rem;
  transition: all 0.2s;
}

.collapsible-trigger:hover { background: var(--bg3); }
.collapsible-trigger .arrow { color: var(--muted); transition: transform 0.2s; font-size: 0.7rem; }
.collapsible-trigger.open .arrow { transform: rotate(90deg); }
.collapsible-content { display: none; }
.collapsible-content.open { display: block; }

/* Filter buttons */
.filter-row {
  display: flex;
  gap: 0.35rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  padding: 0.25rem 0.6rem;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover { color: var(--text); border-color: var(--muted); }
.filter-btn.active { color: var(--cyan); border-color: var(--cyan); background: rgba(6, 182, 212, 0.06); }

/* Date group */
.date-group {
  margin-bottom: 1.25rem;
}

.date-group-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
  padding-bottom: 0.25rem;
  border-bottom: 1px solid rgba(30, 41, 59, 0.5);
}

/* Pills */
.pills { display: flex; flex-wrap: wrap; gap: 0.4rem; }

.pill {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.8rem;
  padding: 0.3rem 0.75rem;
  border-radius: 20px;
  transition: border-color 0.2s;
}

.pill:hover { border-color: var(--cyan); }

/* Quote style for frases */
.frase-card {
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.06), rgba(249, 115, 22, 0.04));
  border-left: 3px solid var(--purple);
  border-radius: 0 8px 8px 0;
  padding: 1rem 1.25rem;
  margin-bottom: 0.5rem;
}

.frase-card p {
  font-family: 'Instrument Serif', serif;
  font-size: 1.05rem;
  font-style: italic;
  color: var(--purple);
  line-height: 1.6;
}

/* Decision list */
.decision-list { list-style: none; padding: 0; }

.decision-list li {
  padding: 0.6rem 0;
  border-bottom: 1px solid rgba(30, 41, 59, 0.5);
  font-size: 0.9rem;
  display: flex;
  gap: 0.6rem;
  align-items: flex-start;
}

.decision-list li::before {
  content: "\25C6";
  color: var(--orange);
  flex-shrink: 0;
  font-size: 0.6rem;
  margin-top: 0.35rem;
}

/* Weekly stats */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  text-align: center;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.6rem;
  font-weight: 500;
  color: var(--cyan);
}

.stat-label {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 0.2rem;
}

/* Whoop */
.whoop-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

.whoop-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  flex: 1;
  min-width: 140px;
}

.whoop-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.25rem;
}

.whoop-value { font-size: 0.95rem; color: var(--green); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--muted);
  font-size: 0.9rem;
}

.empty-state .empty-icon { font-size: 1.6rem; margin-bottom: 0.5rem; opacity: 0.4; }

/* Toast */
.toast {
  position: fixed;
  bottom: 5.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.8rem;
  padding: 0.6rem 1.2rem;
  border-radius: 8px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}

.toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(34, 197, 94, 0.4); }
.toast.error { border-color: rgba(239, 68, 68, 0.4); }

/* FAB */
.fab {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--cyan);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  z-index: 150;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
}

.fab:hover { background: rgba(6, 182, 212, 0.1); border-color: var(--cyan); transform: scale(1.08); }
.fab svg { width: 20px; height: 20px; transition: transform 0.5s; }
.fab.spinning svg { transform: rotate(360deg); }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem 1rem;
}

.loading-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  margin: 0 4px;
  animation: pulse 1.2s ease-in-out infinite;
}

.loading-dot:nth-child(2) { animation-delay: 0.15s; }
.loading-dot:nth-child(3) { animation-delay: 0.3s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

@media (max-width: 640px) {
  .container { padding: 1rem 0.75rem 6rem; }
  .card { padding: 1rem; }
  .section-title { font-size: 1.35rem; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-btn active" data-target="sec-briefing">Briefing</button>
    <button class="nav-btn" data-target="sec-revisar" id="navRevisar">Revisar Tareas<span class="nav-badge" id="navPendienteBadge" style="display:none;">0</span></button>
    <button class="nav-btn" data-target="sec-tareas">Mis Tareas</button>
    <button class="nav-btn" data-target="sec-semanal">Resumen Semanal</button>
  </div>
</nav>

<div class="container">
  <header class="header-block">
    <h1>BRIEFING <span>--</span> SER.SIENDO</h1>
    <div class="header-date" id="headerDate"></div>
  </header>

  <div id="loadingIndicator" class="loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>

  <main id="mainContent" style="display:none;">

    <!-- Section 1: Briefing del Dia -->
    <section id="sec-briefing" class="active">
      <h2 class="section-title"><span class="accent">01</span> Briefing del Dia</h2>
      <div id="whoopSection"></div>
      <div id="mentalSection"></div>
      <div id="decisionesSection"></div>
      <div id="ideasSection"></div>
      <div id="frasesSection"></div>
    </section>

    <!-- Section 2: Revisar Tareas -->
    <section id="sec-revisar">
      <h2 class="section-title">
        <span class="accent">02</span> Revisar Tareas
        <span class="title-badge" id="pendienteCount">0</span>
      </h2>
      <div id="revisarBulkActions" style="display:none; margin-bottom:1rem;">
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn-bulk accept-all" id="btnAcceptAll">Aceptar todas</button>
          <button class="btn-bulk reject-all" id="btnRejectAll">Rechazar todas</button>
        </div>
      </div>
      <div id="revisarContent"></div>
    </section>

    <!-- Section 3: Mis Tareas -->
    <section id="sec-tareas">
      <h2 class="section-title"><span class="accent">03</span> Mis Tareas</h2>
      <div class="filter-row" id="tareasFilter">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="mias">Mias</button>
        <button class="filter-btn" data-filter="equipo">Equipo</button>
      </div>
      <div id="tareasContent"></div>
    </section>

    <!-- Section 4: Resumen Semanal -->
    <section id="sec-semanal">
      <h2 class="section-title"><span class="accent">04</span> Resumen Semanal</h2>
      <div id="semanalContent"></div>
    </section>

  </main>
</div>

<div class="toast" id="toast"></div>

<button class="fab" id="fabRefresh" title="Recargar datos">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"></polyline>
    <polyline points="1 20 1 14 7 14"></polyline>
    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
  </svg>
</button>

<script>
(function() {
  'use strict';

  const API = 'http://72.60.28.156:8099';

  let briefingData = null;
  let pendientesData = [];
  let tareasData = null;
  let semanalData = null;
  let currentFilter = 'todas';

  // -- Helpers --
  function formatDateES(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    } catch(e) { return dateStr; }
  }

  function formatShortDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
    } catch(e) { return dateStr; }
  }

  function priorityOrder(p) {
    return { critica: 0, alta: 1, media: 2, baja: 3 }[(p || '').toLowerCase()] ?? 4;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
  }

  function showToast(msg, type, duration) {
    duration = duration || 2500;
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast visible' + (type ? ' ' + type : '');
    setTimeout(function() { el.className = 'toast'; }, duration);
  }

  function emptyState(msg) {
    return '<div class="empty-state"><div class="empty-icon">--</div><p>' + msg + '</p></div>';
  }

  // -- Fetch --
  async function fetchJSON(url) {
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) return null;
      return await res.json();
    } catch(e) { return null; }
  }

  async function apiPost(endpoint, body) {
    try {
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('API ' + res.status);
      return await res.json();
    } catch(e) {
      showToast('Error de conexion con API', 'error', 3500);
      return null;
    }
  }

  // -- Load --
  async function loadAllData() {
    const [b, p, t, s] = await Promise.all([
      fetchJSON('data/briefing.json'),
      fetchJSON(API + '/pendientes').catch(function() { return null; }),
      fetchJSON(API + '/tareas').catch(function() { return null; }),
      fetchJSON('data/resumen-semanal.json')
    ]);
    briefingData = b;
    pendientesData = Array.isArray(p) ? p : [];
    tareasData = t;
    semanalData = s;
    render();
  }

  // -- Render --
  function render() {
    document.getElementById('loadingIndicator').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderHeader();
    renderBriefing();
    renderRevisar();
    renderTareas();
    renderSemanal();
    updateNavBadge();
  }

  function renderHeader() {
    var fecha = (briefingData && briefingData.fecha) || new Date().toISOString().slice(0, 10);
    document.getElementById('headerDate').textContent = formatDateES(fecha);
  }

  function updateNavBadge() {
    var badge = document.getElementById('navPendienteBadge');
    var count = pendientesData.length;
    if (count > 0) {
      badge.textContent = count;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
    document.getElementById('pendienteCount').textContent = count;
  }

  function renderBriefing() {
    if (!briefingData) {
      document.getElementById('mentalSection').innerHTML = emptyState('Sin datos del briefing de hoy');
      ['whoopSection', 'decisionesSection', 'frasesSection', 'ideasSection'].forEach(function(id) {
        document.getElementById(id).innerHTML = '';
      });
      return;
    }

    // Whoop
    var whoop = briefingData.whoop;
    if (whoop && (whoop.recovery || whoop.sleep)) {
      document.getElementById('whoopSection').innerHTML =
        '<div class="whoop-row" style="margin-bottom:1rem;">' +
        (whoop.recovery ? '<div class="whoop-item"><div class="whoop-label">Recovery</div><div class="whoop-value">' + escapeHtml(whoop.recovery) + '</div></div>' : '') +
        (whoop.sleep ? '<div class="whoop-item"><div class="whoop-label">Sueno</div><div class="whoop-value">' + escapeHtml(whoop.sleep) + '</div></div>' : '') +
        '</div>';
    } else {
      document.getElementById('whoopSection').innerHTML = '';
    }

    // Mental state
    var mental = briefingData.limitless_ayer && briefingData.limitless_ayer.estado_mental;
    if (mental) {
      document.getElementById('mentalSection').innerHTML =
        '<div class="card mental-card" style="margin-bottom:1.25rem;">' +
        '<div class="card-label">Estado mental</div>' +
        '<div class="mental-text">' + escapeHtml(mental) + '</div></div>';
    } else {
      document.getElementById('mentalSection').innerHTML = '';
    }

    // Decisiones
    var decisiones = briefingData.limitless_ayer && briefingData.limitless_ayer.decisiones_criticas;
    if (decisiones && decisiones.length) {
      document.getElementById('decisionesSection').innerHTML =
        '<div class="card-label" style="margin-top:1rem;margin-bottom:0.5rem;">Decisiones criticas</div>' +
        '<ul class="decision-list">' +
        decisiones.map(function(d) { return '<li>' + escapeHtml(d) + '</li>'; }).join('') +
        '</ul>';
    } else {
      document.getElementById('decisionesSection').innerHTML = '';
    }

    // Ideas + Frases
    var ideas = briefingData.ideas_capturadas || [];
    var frases = ideas.filter(function(i) { return typeof i === 'string' && i.toUpperCase().indexOf('FRASE:') === 0; });
    var ideasClean = ideas.filter(function(i) { return typeof i === 'string' && i.toUpperCase().indexOf('FRASE:') !== 0; });

    if (frases.length) {
      document.getElementById('frasesSection').innerHTML =
        '<div class="card-label" style="margin-top:1rem;margin-bottom:0.5rem;">Frases</div>' +
        frases.map(function(f) {
          return '<div class="frase-card"><p>' + escapeHtml(f.replace(/^FRASE:\s*/i, '')) + '</p></div>';
        }).join('');
    } else {
      document.getElementById('frasesSection').innerHTML = '';
    }

    if (ideasClean.length) {
      document.getElementById('ideasSection').innerHTML =
        '<div class="card-label" style="margin-top:1rem;margin-bottom:0.5rem;">Ideas capturadas</div>' +
        '<div class="pills">' +
        ideasClean.map(function(i) { return '<span class="pill">' + escapeHtml(i) + '</span>'; }).join('') +
        '</div>';
    } else {
      document.getElementById('ideasSection').innerHTML = '';
    }
  }

  function renderRevisar() {
    var container = document.getElementById('revisarContent');
    var bulkActions = document.getElementById('revisarBulkActions');

    if (!pendientesData.length) {
      container.innerHTML = emptyState('Sin tareas pendientes de revision');
      bulkActions.style.display = 'none';
      return;
    }

    bulkActions.style.display = 'block';

    // Group by date
    var groups = {};
    pendientesData.forEach(function(t) {
      var fecha = t.fecha || 'sin-fecha';
      if (!groups[fecha]) groups[fecha] = [];
      groups[fecha].push(t);
    });

    var dates = Object.keys(groups).sort().reverse();
    var html = '';

    dates.forEach(function(fecha) {
      html += '<div class="date-group">';
      html += '<div class="date-group-header">' + formatDateES(fecha) + '</div>';
      groups[fecha].forEach(function(t) {
        html += '<div class="candidate-card" data-id="' + escapeHtml(t.id) + '">';
        html += '<div class="candidate-text">' + escapeHtml(t.tarea) + '</div>';
        html += '<div class="candidate-meta">';
        html += '<span class="badge badge-' + escapeHtml(t.tipo || 'pendiente') + '">' + escapeHtml(t.tipo || 'pendiente') + '</span>';
        html += '<span class="badge badge-' + escapeHtml((t.prioridad || 'media').toLowerCase()) + '">' + escapeHtml(t.prioridad || 'media') + '</span>';
        if (t.responsable) html += '<span class="responsable">' + escapeHtml(t.responsable) + '</span>';
        html += '</div>';
        if (t.contexto) html += '<div class="candidate-context">' + escapeHtml(t.contexto) + '</div>';
        html += '<div class="candidate-actions">';
        html += '<button class="btn btn-reject" data-action="reject" data-id="' + escapeHtml(t.id) + '">Rechazar</button>';
        html += '<button class="btn btn-accept" data-action="accept" data-id="' + escapeHtml(t.id) + '">Aceptar</button>';
        html += '</div>';
        html += '</div>';
      });
      html += '</div>';
    });

    container.innerHTML = html;

    // Bind events
    container.querySelectorAll('.btn[data-action]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var action = btn.dataset.action;
        var id = btn.dataset.id;
        if (action === 'accept') acceptTask(id);
        else if (action === 'reject') rejectTask(id);
      });
    });
  }

  async function acceptTask(id) {
    var card = document.querySelector('.candidate-card[data-id="' + id + '"]');
    if (card) card.classList.add('accepted');

    var result = await apiPost('/accept', { id: id });
    if (result) {
      pendientesData = pendientesData.filter(function(t) { return t.id !== id; });
      if (card) {
        card.classList.add('fade-out');
        setTimeout(function() {
          renderRevisar();
          renderTareas();
          updateNavBadge();
        }, 350);
      }
      showToast('Tarea aceptada', 'success');
      // Refresh tracker
      var t = await fetchJSON(API + '/tareas');
      if (t) tareasData = t;
      renderTareas();
    } else {
      if (card) card.classList.remove('accepted');
    }
  }

  async function rejectTask(id) {
    var card = document.querySelector('.candidate-card[data-id="' + id + '"]');
    var result = await apiPost('/reject', { id: id });
    if (result) {
      pendientesData = pendientesData.filter(function(t) { return t.id !== id; });
      if (card) {
        card.classList.add('fade-out');
        setTimeout(function() {
          renderRevisar();
          updateNavBadge();
        }, 350);
      }
      showToast('Tarea rechazada');
    }
  }

  // Bulk actions
  document.getElementById('btnAcceptAll').addEventListener('click', async function() {
    var ids = pendientesData.map(function(t) { return t.id; });
    for (var i = 0; i < ids.length; i++) {
      await apiPost('/accept', { id: ids[i] });
    }
    pendientesData = [];
    var t = await fetchJSON(API + '/tareas');
    if (t) tareasData = t;
    renderRevisar();
    renderTareas();
    updateNavBadge();
    showToast('Todas las tareas aceptadas', 'success');
  });

  document.getElementById('btnRejectAll').addEventListener('click', async function() {
    var ids = pendientesData.map(function(t) { return t.id; });
    for (var i = 0; i < ids.length; i++) {
      await apiPost('/reject', { id: ids[i] });
    }
    pendientesData = [];
    renderRevisar();
    updateNavBadge();
    showToast('Todas las tareas rechazadas');
  });

  function renderTareas() {
    var container = document.getElementById('tareasContent');
    var allTareas = (tareasData && tareasData.tareas) || [];

    if (!allTareas.length) {
      container.innerHTML = emptyState('Sin tareas en el tracker');
      return;
    }

    // Apply filter
    var filtered = allTareas;
    if (currentFilter === 'mias') {
      filtered = allTareas.filter(function(t) {
        return (t.responsable || '').toLowerCase().indexOf('sebastian') !== -1;
      });
    } else if (currentFilter === 'equipo') {
      filtered = allTareas.filter(function(t) {
        return (t.responsable || '').toLowerCase().indexOf('sebastian') === -1;
      });
    }

    var abiertas = filtered
      .filter(function(t) { return t.estado === 'abierta'; })
      .sort(function(a, b) { return priorityOrder(a.prioridad) - priorityOrder(b.prioridad); });

    var cerradas = filtered
      .filter(function(t) { return t.estado === 'cerrada'; })
      .sort(function(a, b) { return (b.fecha_cierre || '').localeCompare(a.fecha_cierre || ''); });

    function taskCardHTML(t) {
      var cls = t.estado === 'cerrada' ? ' cerrada' : '';
      return '<div class="task-card' + cls + '" data-id="' + escapeHtml(t.id) + '">' +
        '<div class="task-checkbox" data-id="' + escapeHtml(t.id) + '"></div>' +
        '<div class="task-body">' +
        '<div class="task-text">' + escapeHtml(t.tarea) + '</div>' +
        '<div class="task-meta">' +
        '<span class="badge badge-' + escapeHtml((t.prioridad || 'media').toLowerCase()) + '">' + escapeHtml(t.prioridad || 'media') + '</span>' +
        (t.responsable ? '<span class="responsable">' + escapeHtml(t.responsable) + '</span>' : '') +
        '<span>' + formatShortDate(t.fecha_creacion) + '</span>' +
        (t.fecha_cierre ? '<span>Cerrada: ' + formatShortDate(t.fecha_cierre) + '</span>' : '') +
        '</div></div></div>';
    }

    var html = '';

    // Abiertas
    html += '<div class="column-header"><h3 style="color:var(--cyan);">Abiertas</h3><span class="count-badge">' + abiertas.length + '</span></div>';
    if (abiertas.length) {
      html += abiertas.map(taskCardHTML).join('');
    } else {
      html += emptyState('Sin tareas abiertas');
    }

    // Cerradas (collapsible)
    html += '<button class="collapsible-trigger" id="cerradasTrigger">' +
      '<span>Cerradas <span class="count-badge" style="margin-left:0.5rem;">' + cerradas.length + '</span></span>' +
      '<span class="arrow">&#9654;</span></button>';
    html += '<div class="collapsible-content" id="cerradasContent">';
    if (cerradas.length) {
      html += cerradas.map(taskCardHTML).join('');
    } else {
      html += emptyState('Sin tareas cerradas');
    }
    html += '</div>';

    container.innerHTML = html;

    // Toggle cerradas
    document.getElementById('cerradasTrigger').addEventListener('click', function() {
      this.classList.toggle('open');
      document.getElementById('cerradasContent').classList.toggle('open');
    });

    // Checkbox toggle
    container.querySelectorAll('.task-checkbox').forEach(function(cb) {
      cb.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleTask(cb.dataset.id);
      });
    });
  }

  async function toggleTask(id) {
    var result = await apiPost('/toggle', { id: id });
    if (result) {
      // Update local data
      var allTareas = (tareasData && tareasData.tareas) || [];
      var task = allTareas.find(function(t) { return t.id === id; });
      if (task) {
        task.estado = result.estado;
        task.fecha_cierre = result.fecha_cierre;
      }
      renderTareas();
      showToast(result.estado === 'cerrada' ? 'Tarea cerrada' : 'Tarea reabierta', 'success');
    }
  }

  // Filter buttons
  document.getElementById('tareasFilter').addEventListener('click', function(e) {
    if (e.target.classList.contains('filter-btn')) {
      document.querySelectorAll('#tareasFilter .filter-btn').forEach(function(b) { b.classList.remove('active'); });
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      renderTareas();
    }
  });

  function renderSemanal() {
    var container = document.getElementById('semanalContent');
    if (!semanalData) {
      container.innerHTML = emptyState('Sin resumen semanal disponible');
      return;
    }

    var html = '';
    var s = semanalData;

    html += '<div class="stats-row">';
    html += '<div class="stat-card"><div class="stat-value">' + (s.tareas_cerradas_semana != null ? s.tareas_cerradas_semana : '--') + '</div><div class="stat-label">Cerradas esta semana</div></div>';
    html += '<div class="stat-card"><div class="stat-value" style="color:var(--orange);">' + (s.tareas_abiertas_acumuladas != null ? s.tareas_abiertas_acumuladas : '--') + '</div><div class="stat-label">Abiertas acumuladas</div></div>';
    html += '<div class="stat-card"><div class="stat-value" style="color:var(--purple);">' + (s.ideas_totales != null ? s.ideas_totales : '--') + '</div><div class="stat-label">Ideas totales</div></div>';
    html += '</div>';

    if (s.aprendizajes && s.aprendizajes.length) {
      html += '<div class="card-label">Aprendizajes clave</div><ul class="decision-list" style="margin-bottom:1.25rem;">';
      html += s.aprendizajes.map(function(a) { return '<li>' + escapeHtml(a) + '</li>'; }).join('');
      html += '</ul>';
    }

    if (s.decisiones_clave && s.decisiones_clave.length) {
      html += '<div class="card-label">Decisiones de la semana</div><ul class="decision-list" style="margin-bottom:1.25rem;">';
      html += s.decisiones_clave.map(function(d) { return '<li>' + escapeHtml(d) + '</li>'; }).join('');
      html += '</ul>';
    }

    if (s.patterns && s.patterns.length) {
      html += '<div class="card-label">Patterns detectados</div><div class="pills" style="margin-bottom:1.25rem;">';
      html += s.patterns.map(function(p) { return '<span class="pill">' + escapeHtml(p) + '</span>'; }).join('');
      html += '</div>';
    }

    if (s.prediccion_proxima) {
      html += '<div class="card mental-card" style="border-color:rgba(249,115,22,0.2);background:linear-gradient(135deg,rgba(249,115,22,0.06),rgba(234,179,8,0.04));">';
      html += '<div class="card-label">Prediccion proxima semana</div>';
      html += '<div class="mental-text" style="color:var(--orange);">' + escapeHtml(s.prediccion_proxima) + '</div></div>';
    }

    container.innerHTML = html || emptyState('Resumen semanal sin contenido');
  }

  // -- Navigation --
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('main section').forEach(function(s) { s.classList.remove('active'); });
      var target = document.getElementById(btn.dataset.target);
      if (target) target.classList.add('active');
    });
  });

  // -- FAB --
  document.getElementById('fabRefresh').addEventListener('click', async function() {
    this.classList.add('spinning');
    await loadAllData();
    showToast('Datos actualizados', 'success');
    var self = this;
    setTimeout(function() { self.classList.remove('spinning'); }, 500);
  });

  // -- Init --
  loadAllData();

})();
</script>
</body>
</html>
